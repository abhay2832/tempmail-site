<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arya Mails - Premium Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: {
                    colors: {
                        darkbg: '#0b1121', darkpanel: '#131c31', darkborder: '#1e293b', 
                        brand: '#22d3ee', brandbg: 'rgba(34, 211, 238, 0.1)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                } 
            } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        /* Auto Color Changing Effect (RGB Shift) */
        @keyframes hue-shift {
            0% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .color-shift { animation: hue-shift 8s infinite linear; }
        
        /* Utility Animations */
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .spin-slow { animation: spin 2s linear infinite; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-800 dark:text-slate-100 min-h-screen pb-16">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="border-b border-slate-200 dark:border-darkborder bg-white/80 dark:bg-darkpanel/80 backdrop-blur-md sticky top-0 z-40 transition-colors">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="color-shift w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Arya<span class="text-cyan-600 dark:text-brand color-shift"> Mails</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-cyan-50 dark:bg-brandbg text-cyan-700 dark:text-brand text-xs font-semibold border border-cyan-200 dark:border-cyan-500/30 color-shift">
                    <i class="fa-solid fa-shield-halved"></i> Trusted by 1M+ users
                </div>
                
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-gray-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-gray-700 transition-colors shadow-sm border border-slate-200 dark:border-gray-700 cursor-pointer relative z-50">
                    <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8 mb-12">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl p-6 md:p-8 text-center shadow-xl dark:shadow-2xl relative overflow-hidden transition-colors">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600 color-shift"></div>
            <p class="text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-4">Your Secure Email Address</p>
            
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl py-4 px-4 bg-slate-50 dark:bg-darkbg border-2 border-dashed border-slate-300 dark:border-darkborder rounded-xl font-mono text-slate-800 dark:text-white font-bold transition-all focus:outline-none focus:border-cyan-500" value="Generating...">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-50 dark:bg-darkbg rounded-xl flex items-center justify-center border-2 border-transparent">
                    <i class="fa-solid fa-circle-notch spin-slow text-3xl text-cyan-600 dark:text-brand color-shift"></i>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3 relative z-10">
                <button onclick="copyEmail()" class="color-shift bg-cyan-600 hover:bg-cyan-700 dark:bg-cyan-600 dark:hover:bg-cyan-500 text-white px-8 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-md cursor-pointer">
                    <i class="fa-regular fa-copy"></i> Copy Address
                </button>
                <button onclick="forceNewAccount()" class="bg-slate-100 dark:bg-transparent hover:bg-slate-200 dark:hover:bg-darkborder text-slate-700 dark:text-gray-300 border border-slate-300 dark:border-darkborder px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-sm cursor-pointer">
                    <i class="fa-solid fa-arrows-rotate"></i> Change Email
                </button>
            </div>
            <p id="copy-msg" class="text-emerald-600 dark:text-green-400 text-sm font-bold mt-4 opacity-0 transition-opacity duration-300">Copied to clipboard!</p>
        </div>
    </div>

    <div class="text-center max-w-3xl mx-auto px-4 mb-6">
        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Real-time <span class="text-cyan-600 dark:text-brand color-shift">Inbox</span></h2>
        <p class="text-slate-500 dark:text-gray-400 text-sm md:text-base transition-colors">Receive and manage your temporary emails instantly.</p>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl overflow-hidden shadow-xl dark:shadow-2xl transition-colors">
            
            <div class="bg-slate-50 dark:bg-darkbg/50 px-5 py-4 border-b border-slate-200 dark:border-darkborder flex justify-between items-center transition-colors">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-envelope text-cyan-600 dark:text-brand color-shift text-lg"></i>
                    <span class="text-slate-800 dark:text-white font-bold text-lg tracking-wide">Inbox</span>
                    <span id="badge-new" class="color-shift bg-cyan-100 dark:bg-brandbg text-cyan-700 dark:text-brand text-xs px-2.5 py-1 rounded-full border border-cyan-200 dark:border-cyan-500/20 font-semibold hidden">0 new</span>
                </div>
            </div>

            <div class="px-5 py-3 border-b border-slate-200 dark:border-darkborder flex flex-wrap items-center gap-4 text-xs font-semibold text-slate-600 dark:text-gray-400 bg-white dark:bg-darkpanel transition-colors relative z-10">
                
                <div class="flex items-center gap-1.5"><i class="fa-solid fa-bolt text-amber-500 dark:text-gray-500"></i> Auto-Sync</div>
                
                <button onclick="changeRefreshInterval()" class="color-shift bg-cyan-50 dark:bg-brandbg border border-cyan-200 dark:border-cyan-500/30 text-cyan-700 dark:text-brand px-3 py-1.5 rounded-md flex items-center gap-1.5 hover:bg-cyan-100 dark:hover:bg-cyan-900/40 transition active:scale-95 cursor-pointer">
                    <i id="interval-icon" class="fa-solid fa-rotate-right"></i> <span id="interval-text">10s</span>
                </button>
                
                <div class="flex items-center gap-1.5 text-slate-800 dark:text-white">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></span> Live
                </div>
                
                <button onclick="toggleAudio()" class="flex items-center gap-1.5 hover:text-cyan-600 dark:hover:text-white transition ml-2 active:scale-95 cursor-pointer p-1">
                    <i id="notif-icon" class="fa-regular fa-bell"></i> <span id="notif-text">Sound Off</span>
                </button>
                
                <button onclick="manualFetch()" id="fetch-btn" class="bg-slate-800 dark:bg-darkborder hover:bg-slate-700 dark:hover:bg-gray-700 text-white px-4 py-2 rounded-md flex items-center gap-2 ml-auto transition shadow-sm active:scale-95 cursor-pointer">
                    <i id="fetch-icon" class="fa-solid fa-envelope-open-text"></i> Fetch Emails
                </button>
            </div>

            <div class="px-5 py-2.5 border-b border-slate-200 dark:border-darkborder flex justify-between items-center text-xs font-medium text-slate-500 dark:text-gray-400 bg-slate-50 dark:bg-darkbg transition-colors">
                <div class="flex gap-6">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-filter"></i> All Emails</span>
                </div>
                <div id="total-emails" class="font-bold text-slate-800 dark:text-white">0 emails</div>
            </div>
            
            <div id="inbox-content" class="min-h-[350px] bg-white dark:bg-[#0f1525] transition-colors relative"></div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 bg-slate-900/60 dark:bg-darkbg/80 hidden justify-center items-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-darkpanel w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-slate-200 dark:border-darkborder">
            <div class="p-5 border-b border-slate-200 dark:border-darkborder flex justify-between items-start bg-slate-50 dark:bg-darkbg">
                <div class="pr-4 flex-1 min-w-0">
                    <h3 id="modal-subject" class="font-bold text-xl text-slate-900 dark:text-white mb-1 truncate">Subject</h3>
                    <p class="text-sm text-slate-500 dark:text-gray-400 truncate">From: <span id="modal-from" class="text-cyan-600 dark:text-brand font-semibold color-shift"></span></p>
                </div>
                <div class="flex gap-2 flex-shrink-0">
                    <button onclick="downloadMail()" class="p-2 text-slate-500 dark:text-gray-400 hover:text-cyan-600 dark:hover:text-brand bg-slate-200 dark:bg-darkborder/50 hover:bg-slate-300 dark:hover:bg-darkborder rounded-lg transition">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button onclick="closeModal()" class="p-2 text-slate-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 bg-slate-200 dark:bg-darkborder/50 hover:bg-slate-300 dark:hover:bg-darkborder rounded-lg transition">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
            </div>
            <div id="modal-body" class="flex-1 bg-white relative"></div>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let token = localStorage.getItem('mt_token');
        let address = localStorage.getItem('mt_email');
        let syncTimer = null;
        let refreshSec = 10; 
        let lastMailId = null; 
        let soundOn = false;
        let currentMail = null;

        // ================== INIT ==================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            // Auto reload logic check
            if (token && address) {
                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                startInboxSync();
            } else {
                generateNewEmail();
            }
        });

        // ================== UI FUNCTIONS ==================
        function initTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (localStorage.getItem('theme') === 'light') {
                html.classList.remove('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.replace('text-yellow-400', 'text-slate-600');
            } else {
                html.classList.add('dark'); 
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.replace('text-slate-600', 'text-yellow-400');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.replace('text-yellow-400', 'text-slate-600');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.replace('text-slate-600', 'text-yellow-400');
            }
        }

        function toggleAudio() {
            let icon = document.getElementById('notif-icon');
            let text = document.getElementById('notif-text');
            
            if(!soundOn) {
                soundOn = true;
                // Pre-load audio on user gesture
                document.getElementById('notification-sound').play().then(() => {
                    document.getElementById('notification-sound').pause();
                }).catch(e=>{});
                
                icon.classList.replace('fa-regular', 'fa-solid');
                icon.classList.add('text-cyan-600', 'dark:text-brand', 'color-shift'); 
                text.classList.add('text-cyan-600', 'dark:text-brand', 'color-shift');
                text.innerText = "Sound On";
            } else {
                soundOn = false;
                icon.classList.replace('fa-solid', 'fa-regular');
                icon.classList.remove('text-cyan-600', 'dark:text-brand', 'color-shift'); 
                text.classList.remove('text-cyan-600', 'dark:text-brand', 'color-shift');
                text.innerText = "Sound Off";
            }
        }

        function changeRefreshInterval() {
            let arr = [10, 30, 50];
            refreshSec = arr[(arr.indexOf(refreshSec) + 1) % arr.length];
            document.getElementById('interval-text').innerText = refreshSec + 's';
            if(document.getElementById('auto-time')) {
                document.getElementById('auto-time').innerText = refreshSec;
            }
            
            if(syncTimer) {
                clearInterval(syncTimer);
                syncTimer = setInterval(checkMails, refreshSec * 1000);
            }
        }

        function manualFetch() {
            let btn = document.getElementById('fetch-icon');
            btn.classList.add('fa-spin'); 
            checkMails().then(() => setTimeout(() => btn.classList.remove('fa-spin'), 500));
        }

        function copyEmail() {
            let val = document.getElementById('email-address').value;
            if(!val || val.includes('Generating')) return;
            navigator.clipboard.writeText(val).then(() => {
                let m = document.getElementById('copy-msg');
                m.classList.remove('opacity-0');
                setTimeout(() => m.classList.add('opacity-0'), 2000);
            });
        }

        // ================== API LOGIC ==================
        function forceNewAccount() {
            localStorage.removeItem('mt_token');
            localStorage.removeItem('mt_email');
            token = null;
            address = null;
            generateNewEmail();
        }

        async function generateNewEmail() {
            if(syncTimer) clearInterval(syncTimer);
            lastMailId = null;
            
            let input = document.getElementById('email-address');
            let overlay = document.getElementById('loading-overlay');
            
            overlay.classList.remove('hidden');
            input.value = 'Generating...';
            renderEmpty();

            try {
                let domRes = await fetch(`${API}/domains`);
                let domData = await domRes.json();
                let domainName = domData['hydra:member'][0].domain;

                let randomStr = Math.random().toString(36).substring(2, 12);
                let newAddress = `${randomStr}@${domainName}`;
                let newPassword = 'PWD_' + Math.random().toString(36); 

                await fetch(`${API}/accounts`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newAddress, password: newPassword })
                });

                let tokRes = await fetch(`${API}/token`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newAddress, password: newPassword })
                });
                let tokData = await tokRes.json();
                
                token = tokData.token;
                address = newAddress;
                
                localStorage.setItem('mt_token', token);
                localStorage.setItem('mt_email', address);

                input.value = address;
                overlay.classList.add('hidden');
                
                startInboxSync();
            } catch (err) {
                overlay.classList.add('hidden');
                input.value = 'Network Error. Change Email.';
            }
        }

        function startInboxSync() {
            checkMails(); 
            if(syncTimer) clearInterval(syncTimer);
            syncTimer = setInterval(checkMails, refreshSec * 1000);
        }

        async function checkMails() {
            if (!token) return;
            try {
                let res = await fetch(`${API}/messages`, { headers: { 'Authorization': `Bearer ${token}` } });
                
                // Crash Fix: If token expired, get new mail instantly
                if (res.status === 401) {
                    forceNewAccount();
                    return;
                }
                
                let data = await res.json();
                let msgs = data['hydra:member'] || [];
                
                document.getElementById('total-emails').innerText = `${msgs.length} emails`;
                
                if (msgs.length > 0) {
                    let topId = msgs[0].id;
                    if (lastMailId !== null && topId !== lastMailId && soundOn) {
                        let audio = document.getElementById('notification-sound');
                        audio.currentTime = 0; audio.play().catch(e=>console.log(e));
                    }
                    lastMailId = topId;
                    
                    document.getElementById('badge-new').innerText = `${msgs.length} new`;
                    document.getElementById('badge-new').classList.remove('hidden');
                    renderList(msgs);
                } else {
                    document.getElementById('badge-new').classList.add('hidden');
                    renderEmpty();
                }
            } catch (err) {} 
        }

        // ================== RENDERING ==================
        function renderEmpty() {
            document.getElementById('inbox-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full p-16">
                    <div class="text-slate-300 dark:text-gray-500 text-6xl mb-4 transition-colors"><i class="fa-solid fa-inbox"></i></div>
                    <h3 class="text-slate-800 dark:text-white font-bold text-lg mb-2 transition-colors">No emails yet</h3>
                    <p class="text-slate-500 dark:text-gray-400 text-sm mb-4 transition-colors">Waiting for incoming messages...</p>
                    <div class="flex justify-center mb-3">
                        <span class="color-shift text-cyan-700 dark:text-brand text-xs font-semibold flex items-center gap-1.5 bg-cyan-50 dark:bg-brandbg px-3 py-1 rounded border border-cyan-200 dark:border-cyan-500/20 transition-colors">
                            <i class="fa-solid fa-key"></i> Token-secured access
                        </span>
                    </div>
                    <p class="text-slate-400 dark:text-gray-500 text-xs transition-colors">Auto-checking every <span id="auto-time">${refreshSec}</span> seconds...</p>
                </div>`;
        }

        function renderList(msgs) {
            let html = '<ul class="divide-y divide-slate-100 dark:divide-darkborder">';
            msgs.forEach(m => {
                html += `
                    <li class="p-5 hover:bg-slate-50 dark:hover:bg-darkborder/30 cursor-pointer flex items-center gap-4 transition-colors" onclick="openMail('${m.id}')">
                        <div class="color-shift bg-cyan-100 dark:bg-brandbg text-cyan-700 dark:text-brand rounded-full w-12 h-12 flex items-center justify-center font-bold border border-cyan-200 dark:border-cyan-500/20 transition-colors text-lg">
                            ${m.from.address.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <p class="font-bold text-slate-800 dark:text-gray-100 truncate pr-4 transition-colors">${m.from.address}</p>
                                <span class="text-xs text-slate-500 dark:text-gray-400 bg-slate-100 dark:bg-darkbg px-2 py-1 rounded border border-slate-200 dark:border-darkborder font-medium transition-colors">${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <p class="text-sm text-slate-600 dark:text-gray-400 truncate transition-colors">${m.subject || '(No Subject)'}</p>
                        </div>
                    </li>`;
            });
            html += '</ul>';
            document.getElementById('inbox-content').innerHTML = html;
        }

        // ================== MAIL READING ==================
        async function openMail(id) {
            let mod = document.getElementById('email-modal');
            let bod = document.getElementById('modal-body');
            mod.classList.remove('hidden'); mod.classList.add('flex');
            bod.innerHTML = `<div class="absolute inset-0 flex items-center justify-center bg-white"><i class="color-shift fa-solid fa-circle-notch spin-slow text-3xl text-cyan-600 dark:text-brand"></i></div>`;

            try {
                let res = await fetch(`${API}/messages/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                let data = await res.json();
                currentMail = data;
                document.getElementById('modal-subject').innerText = data.subject || '(No Subject)';
                document.getElementById('modal-from').innerText = data.from.address;

                let content = data.html ? data.html.join('') : `<div style="padding:20px; font-family:sans-serif; color:#333;">${data.text}</div>`;
                let frame = document.createElement('iframe');
                frame.style.width = '100%'; frame.style.height = '100%'; frame.style.border = 'none';
                frame.sandbox = 'allow-popups allow-popups-to-escape-sandbox allow-same-origin'; 
                frame.srcdoc = content;
                bod.innerHTML = ''; bod.appendChild(frame);
            } catch (err) { bod.innerHTML = `<p class="text-center text-red-500 mt-10 font-bold">Error loading email.</p>`; }
        }

        function downloadMail() {
            if (!currentMail) return;
            let c = currentMail.html ? currentMail.html.join('') : currentMail.text;
            let b = new Blob([c], { type: 'text/html' });
            let u = URL.createObjectURL(b);
            let a = document.createElement('a');
            a.href = u; a.download = 'email.html';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
        }

        function closeModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
            document.getElementById('modal-body').innerHTML = ''; currentMail = null;
        }
    </script>
</body>
</html>
