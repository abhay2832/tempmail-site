<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporary Email</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4c6ef5,#7b2ff7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h1{text-align:center;margin-bottom:20px;}
.email-box{display:flex;gap:10px;margin-bottom:15px;}
input{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#4c6ef5;
    color:white;
    cursor:pointer;
    font-size:14px;
}
button:hover{background:#364fc7;}
.secondary{background:#868e96;}
.secondary:hover{background:#495057;}
.inbox{
    margin-top:15px;
    max-height:300px;
    overflow-y:auto;
}
.message{
    background:#f1f3f5;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    cursor:pointer;
}
.message small{color:#666;}
.body-box{
    background:#e9ecef;
    padding:10px;
    border-radius:6px;
    margin-top:5px;
    font-size:14px;
    white-space:pre-wrap;
}
.empty{text-align:center;color:#888;margin-top:20px;}
.status{text-align:center;margin-top:10px;font-size:14px;}
</style>
</head>

<body>

<div class="container">
<h1>Temporary Email</h1>

<div class="email-box">
<input type="text" id="email" readonly>
<button onclick="copyEmail()">Copy</button>
</div>

<div class="email-box">
<button onclick="generateNew()">Generate New</button>
<button class="secondary" onclick="fetchMessages()">Refresh</button>
</div>

<div id="status" class="status"></div>
<div class="inbox" id="inbox"></div>
</div>

<script>
let token="";
let currentEmail="";
let password="";

window.onload = async function(){
    const savedEmail = localStorage.getItem("tm_email");
    const savedPassword = localStorage.getItem("tm_password");

    if(savedEmail && savedPassword){
        currentEmail = savedEmail;
        password = savedPassword;
        await login();
    } else {
        await createAccount();
    }
};

async function createAccount(){
try{
setStatus("Generating email...");
clearInbox();

const domainRes = await fetch("https://api.mail.tm/domains");
const domainData = await domainRes.json();

if(!domainData["hydra:member"] || domainData["hydra:member"].length === 0){
throw new Error("No domain available");
}

const domain = domainData["hydra:member"][0].domain;

currentEmail = Math.random().toString(36).substring(2,10)+"@"+domain;
password = Math.random().toString(36).substring(2,12);

const accRes = await fetch("https://api.mail.tm/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:currentEmail,password:password})
});

if(!accRes.ok){
throw new Error("Account creation failed");
}

localStorage.setItem("tm_email",currentEmail);
localStorage.setItem("tm_password",password);

await login();

}catch(err){
setStatus("Error: "+err.message);
}
}

async function login(){
try{
const tokenRes = await fetch("https://api.mail.tm/token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:currentEmail,password:password})
});

if(!tokenRes.ok){
throw new Error("Login failed");
}

const tokenData = await tokenRes.json();
token = tokenData.token;

document.getElementById("email").value = currentEmail;
setStatus("Email Ready");
fetchMessages();

}catch(err){
localStorage.clear();
await createAccount();
}
}

async function fetchMessages(){
if(!token)return;

try{
const res = await fetch("https://api.mail.tm/messages",{
headers:{Authorization:"Bearer "+token}
});

if(!res.ok)return;

const data = await res.json();
renderInbox(data["hydra:member"]);

}catch(err){
console.log("Inbox error");
}
}

async function openMessage(id,container){
try{
const res = await fetch("https://api.mail.tm/messages/"+id,{
headers:{Authorization:"Bearer "+token}
});
const data = await res.json();

let content="";
if(data.text && data.text.trim()!==""){
content=data.text;
}
else if(data.html && data.html.length>0){
content=data.html[0];
}
else{
content="No content available";
}

const body=document.createElement("div");
body.className="body-box";
body.innerHTML=content;
container.appendChild(body);

}catch(err){
alert("Failed to load email content");
}
}

function renderInbox(messages){
const inbox=document.getElementById("inbox");
inbox.innerHTML="";

if(!messages || messages.length===0){
inbox.innerHTML='<div class="empty">No emails yet</div>';
return;
}

messages.forEach(msg=>{
const div=document.createElement("div");
div.className="message";
div.innerHTML=`
<strong>${escapeHtml(msg.subject || "No Subject")}</strong><br>
<small>From: ${escapeHtml(msg.from.address)}</small><br>
<small>${new Date(msg.createdAt).toLocaleString()}</small>
`;

div.onclick=()=>{
if(!div.querySelector(".body-box")){
openMessage(msg.id,div);
}
};

inbox.appendChild(div);
});
}

function generateNew(){
localStorage.clear();
createAccount();
}

function copyEmail(){
navigator.clipboard.writeText(currentEmail);
alert("Email copied!");
}

function setStatus(text){
document.getElementById("status").innerText=text;
}

function clearInbox(){
document.getElementById("inbox").innerHTML="";
}

function escapeHtml(text){
const div=document.createElement("div");
div.innerText=text;
return div.innerHTML;
}

setInterval(fetchMessages,10000);
</script>

</body>
</html>
