<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Mails - Premium Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: {
                    colors: {
                        darkbg: '#0b1121', darkpanel: '#131c31', darkborder: '#1e293b', 
                        brand: '#22d3ee', brandbg: 'rgba(34, 211, 238, 0.1)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                } 
            } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(180deg); } 100% { filter: hue-rotate(360deg); } }
        .color-shift { animation: hue-shift 8s infinite linear; }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .spin-slow { animation: spin 2s linear infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-800 dark:text-slate-100 min-h-screen pb-16">

    <nav class="border-b border-slate-200 dark:border-darkborder bg-white/80 dark:bg-darkpanel/80 backdrop-blur-md sticky top-0 z-40 transition-colors">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="color-shift w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Aryan<span class="text-cyan-600 dark:text-brand color-shift"> Mails</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-gray-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-gray-700 transition-colors shadow-sm border border-slate-200 dark:border-gray-700 cursor-pointer">
                    <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8 mb-12">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl p-6 md:p-8 text-center shadow-xl dark:shadow-2xl relative overflow-hidden transition-colors">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600 color-shift"></div>
            <p class="text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-4">Your Secure Email Address</p>
            
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl py-4 px-4 bg-slate-50 dark:bg-darkbg border-2 border-dashed border-slate-300 dark:border-darkborder rounded-xl font-mono text-slate-800 dark:text-white font-bold transition-all focus:outline-none focus:border-cyan-500" value="Generating...">
            </div>

            <div class="flex flex-wrap justify-center gap-3 relative z-10">
                <button onclick="copyEmail()" class="color-shift bg-cyan-600 hover:bg-cyan-700 text-white px-8 py-3 rounded-xl transition font-semibold flex items-center gap-2 shadow-md cursor-pointer">
                    <i class="fa-regular fa-copy"></i> Copy Address
                </button>
                <button onclick="forceNewAccount()" class="bg-slate-100 dark:bg-transparent hover:bg-slate-200 dark:hover:bg-darkborder text-slate-700 dark:text-gray-300 border border-slate-300 dark:border-darkborder px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 shadow-sm cursor-pointer">
                    <i class="fa-solid fa-arrows-rotate"></i> Change Email
                </button>
                <button onclick="manualFetch()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 shadow-md cursor-pointer">
                    <i class="fa-solid fa-rotate"></i> Refresh Inbox
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl overflow-hidden shadow-xl dark:shadow-2xl transition-colors">
            
            <div class="px-5 py-3 border-b border-slate-200 dark:border-darkborder flex flex-wrap items-center justify-between bg-slate-50 dark:bg-darkbg transition-colors">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-envelope text-cyan-600 dark:text-brand text-lg"></i>
                    <span class="text-slate-800 dark:text-white font-bold text-lg">Inbox</span>
                    <div class="flex items-center gap-1.5 ml-2 text-xs font-semibold text-slate-600 dark:text-gray-400">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></span> Live (<span id="total-emails">0</span>)
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="manualFetch()" class="bg-slate-800 dark:bg-darkborder hover:bg-slate-700 dark:hover:bg-gray-700 text-white px-3 py-1.5 rounded-md flex items-center gap-2 text-sm transition">
                        <i class="fa-solid fa-rotate-right"></i> Fetch
                    </button>
                    <button onclick="clearInbox()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-md flex items-center gap-2 text-sm transition shadow-sm">
                        <i class="fa-solid fa-trash-can"></i> Clear All
                    </button>
                </div>
            </div>
            
            <div id="inbox-content" class="min-h-[300px] bg-white dark:bg-[#0f1525] p-2 transition-colors flex flex-col gap-2">
                <div class="text-center text-slate-500 py-10">Waiting for incoming emails...</div>
            </div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 bg-slate-900/80 hidden justify-center items-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-darkpanel w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-slate-200 dark:border-darkborder">
            <div class="p-5 border-b border-slate-200 dark:border-darkborder flex justify-between items-start bg-slate-50 dark:bg-darkbg">
                <div class="pr-4 flex-1">
                    <h3 id="modal-subject" class="font-bold text-xl text-slate-900 dark:text-white mb-1">Subject</h3>
                    <p class="text-sm text-slate-500 dark:text-gray-400">From: <span id="modal-from" class="text-cyan-600 dark:text-brand font-semibold"></span></p>
                </div>
                <button onclick="closeModal()" class="p-2 text-slate-500 hover:text-red-500 bg-slate-200 dark:bg-darkborder rounded-lg transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <iframe id="modal-body-iframe" class="flex-1 w-full bg-white" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let token = localStorage.getItem('mt_token');
        let address = localStorage.getItem('mt_email');
        let password = localStorage.getItem('mt_password') || generatePassword();
        let syncTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (token && address) {
                document.getElementById('email-address').value = address;
                startInboxSync();
                manualFetch();
            } else {
                generateNewEmail();
            }
        });

        // --- Theme & UI ---
        function initTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        function copyEmail() {
            navigator.clipboard.writeText(document.getElementById('email-address').value);
            alert("Email Copied!");
        }

        // --- Mail API Logic ---
        function generatePassword() {
            return Math.random().toString(36).slice(-8) + "Aa1@";
        }

        async function generateNewEmail() {
            document.getElementById('email-address').value = "Generating...";
            try {
                // 1. Get Domain
                const domainRes = await fetch(`${API}/domains`);
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;
                
                // 2. Create Account
                address = `user_${Math.floor(Math.random() * 100000)}@${domain}`;
                localStorage.setItem('mt_password', password);

                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });

                // 3. Get Token
                const tokenRes = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });
                const tokenData = await tokenRes.json();
                token = tokenData.token;

                localStorage.setItem('mt_token', token);
                localStorage.setItem('mt_email', address);
                
                document.getElementById('email-address').value = address;
                document.getElementById('inbox-content').innerHTML = '<div class="text-center text-slate-500 py-10">Waiting for incoming emails...</div>';
                document.getElementById('total-emails').innerText = "0";
                
                startInboxSync();
            } catch (err) {
                console.error("Error creating email:", err);
                document.getElementById('email-address').value = "Error generating email!";
            }
        }

        function forceNewAccount() {
            localStorage.removeItem('mt_token');
            localStorage.removeItem('mt_email');
            password = generatePassword();
            if(syncTimer) clearInterval(syncTimer);
            generateNewEmail();
        }

        function startInboxSync() {
            if(syncTimer) clearInterval(syncTimer);
            syncTimer = setInterval(manualFetch, 8000); // Check every 8 seconds
        }

        async function manualFetch() {
            if(!token) return;
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                renderMails(data['hydra:member']);
            } catch (error) {
                console.error("Error fetching mails:", error);
            }
        }

        function renderMails(mails) {
            const container = document.getElementById('inbox-content');
            document.getElementById('total-emails').innerText = mails.length;
            
            if (mails.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-500 py-10">Inbox is empty. Waiting for emails...</div>';
                return;
            }

            container.innerHTML = '';
            mails.forEach(mail => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 dark:bg-[#131c31] dark:hover:bg-darkborder rounded-xl cursor-pointer transition border border-slate-200 dark:border-darkborder mb-2";
                div.onclick = () => openMessage(mail.id);
                
                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="font-bold text-slate-900 dark:text-white truncate">${mail.subject || "(No Subject)"}</div>
                        <div class="text-sm text-cyan-600 dark:text-brand truncate">${mail.from.address}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-slate-500">${new Date(mail.createdAt).toLocaleTimeString()}</span>
                        <button onclick="deleteMessage('${mail.id}', event)" class="p-2 text-red-500 hover:text-red-700 bg-red-100 dark:bg-red-500/10 hover:bg-red-200 rounded-lg transition ml-2">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- View Message Logic & Cutout.pro Fix ---
        async function openMessage(id) {
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
            
            try {
                const res = await fetch(`${API}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const mail = await res.json();
                
                document.getElementById('modal-subject').innerText = mail.subject;
                document.getElementById('modal-from').innerText = mail.from.address;
                
                // Inject HTML into iframe and force target="_blank" so links open externally
                const iframe = document.getElementById('modal-body-iframe');
                let htmlContent = mail.html ? mail.html[0] : (mail.text ? `<pre class="p-4">${mail.text}</pre>` : "No content");
                
                // Hack to ensure all links open in a new tab (Fixes cutout.pro activation)
                const baseTag = '<base target="_blank">';
                htmlContent = baseTag + htmlContent;

                iframe.srcdoc = htmlContent;

            } catch (err) {
                console.error(err);
                document.getElementById('modal-body-iframe').srcdoc = "Error loading message.";
            }
        }

        function closeModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
            document.getElementById('modal-body-iframe').srcdoc = ""; // Clear iframe memory
        }

        // --- Delete Functions ---
        async function deleteMessage(id, event) {
            event.stopPropagation(); // Stop row click from opening the modal
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; // Loading icon
            
            try {
                await fetch(`${API}/messages/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                manualFetch(); // Refresh after delete
            } catch(err) {
                console.error("Delete Error", err);
                alert("Failed to delete message.");
            }
        }

        async function clearInbox() {
            if(!confirm("Are you sure you want to delete ALL emails?")) return;
            
            try {
                const res = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if(data['hydra:member'].length === 0) {
                    alert("Inbox is already empty!");
                    return;
                }

                // Loop through and delete all
                for (let mail of data['hydra:member']) {
                    await fetch(`${API}/messages/${mail.id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                }
                
                manualFetch();
                alert("All emails deleted successfully!");
            } catch(err) {
                console.error("Clear Inbox Error", err);
                alert("Failed to clear inbox.");
            }
        }
    </script>
</body>
</html>
