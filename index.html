<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Mails - Premium Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: {
                    colors: {
                        darkbg: '#0b1121', darkpanel: '#131c31', darkborder: '#1e293b', 
                        brand: 'var(--brand-color, #22d3ee)', brandbg: 'rgba(34, 211, 238, 0.1)',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                } 
            } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --brand-color: #22d3ee; --hue-rotate: 0deg; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        /* Theme Application */
        .theme-apply { filter: hue-rotate(var(--hue-rotate)); }
        .color-shift { animation: hue-shift 8s infinite linear; }
        @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(180deg); } 100% { filter: hue-rotate(360deg); } }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .spin-slow { animation: spin 2s linear infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #334155; }
        .stat-update { animation: highlight-stat 1s ease-out; }
        @keyframes highlight-stat { 0% { color: #22d3ee; transform: scale(1.05); } 100% { color: inherit; transform: scale(1); } }
        
        /* New Theme Panel Style */
        #theme-panel { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        #theme-panel.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-800 dark:text-slate-100 min-h-screen pb-16 theme-apply">

    <div id="theme-panel" class="fixed right-0 top-0 h-full w-72 bg-white dark:bg-darkpanel shadow-2xl z-[100] border-l border-slate-200 dark:border-darkborder p-5">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-lg">Magic Themes</h3>
            <button onclick="toggleThemePanel()" class="text-slate-500 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <p class="text-xs text-slate-500 mb-4 font-bold uppercase tracking-widest">Select From 100+ Themes</p>
        <div class="grid grid-cols-5 gap-2 mb-6 max-h-[60vh] overflow-y-auto pr-2" id="theme-grid">
            </div>
        <div class="border-t border-slate-200 dark:border-darkborder pt-4">
            <p class="text-xs font-bold mb-2 uppercase">Custom Color Picker</p>
            <input type="color" oninput="document.documentElement.style.setProperty('--brand-color', this.value); document.documentElement.style.setProperty('--hue-rotate', '0deg');" class="w-full h-10 rounded cursor-pointer border-none bg-transparent">
        </div>
    </div>

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="border-b border-slate-200 dark:border-darkborder bg-white/80 dark:bg-darkpanel/80 backdrop-blur-md sticky top-0 z-40 transition-colors">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="color-shift w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Aryan<span class="text-cyan-600 dark:text-brand color-shift"> Mails</span></span>
            </div>
            
            <div class="hidden lg:flex items-center gap-2 px-3 py-1.5 rounded-full bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-500/30">
                <span class="text-xs font-bold text-orange-600 dark:text-orange-400">Indian Mails 🇮🇳</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-cyan-50 dark:bg-brandbg text-cyan-700 dark:text-brand text-xs font-semibold border border-cyan-200 dark:border-cyan-500/30 color-shift">
                    <i class="fa-solid fa-shield-halved"></i> Trusted by 1M+ users
                </div>
                <button onclick="toggleThemePanel()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-gray-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-gray-700 transition-colors border border-slate-200 dark:border-gray-700 text-indigo-500">
                    <i class="fa-solid fa-palette"></i>
                </button>
                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-gray-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-gray-700 transition-colors shadow-sm border border-slate-200 dark:border-gray-700 cursor-pointer relative z-50">
                    <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8 mb-12">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl p-6 md:p-8 text-center shadow-xl dark:shadow-2xl relative overflow-hidden transition-colors">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600 color-shift"></div>
            <p class="text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-4">Your Secure Email Address</p>
            
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl py-4 px-4 bg-slate-50 dark:bg-darkbg border-2 border-dashed border-slate-300 dark:border-darkborder rounded-xl font-mono text-slate-800 dark:text-white font-bold transition-all focus:outline-none focus:border-cyan-500" value="Generating...">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-50 dark:bg-darkbg rounded-xl flex items-center justify-center border-2 border-transparent">
                    <i class="fa-solid fa-circle-notch spin-slow text-3xl text-cyan-600 dark:text-brand color-shift"></i>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3 relative z-10">
                <button onclick="copyEmail()" class="color-shift bg-cyan-600 hover:bg-cyan-700 dark:bg-cyan-600 dark:hover:bg-cyan-500 text-white px-8 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-md cursor-pointer">
                    <i class="fa-regular fa-copy"></i> Copy Address
                </button>
                <button onclick="forceNewAccount()" class="bg-slate-100 dark:bg-transparent hover:bg-slate-200 dark:hover:bg-darkborder text-slate-700 dark:text-gray-300 border border-slate-300 dark:border-darkborder px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-sm cursor-pointer">
                    <i class="fa-solid fa-arrows-rotate"></i> Change Email
                </button>
                <button onclick="manualFetch()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 shadow-md cursor-pointer text-sm">
                    <i class="fa-solid fa-rotate"></i> Refresh Inbox
                </button>
            </div>
            <p id="copy-msg" class="text-emerald-600 dark:text-green-400 text-sm font-bold mt-4 opacity-0 transition-opacity duration-300">Copied to clipboard!</p>
        </div>
    </div>

    <div class="text-center max-w-3xl mx-auto px-4 mb-6">
        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Real-time <span class="text-cyan-600 dark:text-brand color-shift">Inbox</span></h2>
        <p class="text-slate-500 dark:text-gray-400 text-sm md:text-base transition-colors">Receive and manage your temporary emails instantly.</p>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl overflow-hidden shadow-xl dark:shadow-2xl transition-colors">
            <div class="bg-slate-50 dark:bg-darkbg/50 px-5 py-4 border-b border-slate-200 dark:border-darkborder flex justify-between items-center transition-colors">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-envelope text-cyan-600 dark:text-brand color-shift text-lg"></i>
                    <span class="text-slate-800 dark:text-white font-bold text-lg tracking-wide">Inbox</span>
                </div>
                <button onclick="clearInbox()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md flex items-center gap-2 transition shadow-sm active:scale-95 cursor-pointer text-sm font-semibold">
                    <i class="fa-solid fa-trash-can"></i> Clear Inbox
                </button>
            </div>

            <div class="px-5 py-3 border-b border-slate-200 dark:border-darkborder flex flex-wrap items-center gap-4 text-xs font-semibold text-slate-600 dark:text-gray-400 bg-white dark:bg-darkpanel transition-colors relative z-10">
                <div class="flex items-center gap-1.5"><i class="fa-solid fa-bolt text-amber-500 dark:text-gray-500"></i> Auto-Sync</div>
                <button onclick="changeRefreshInterval()" class="color-shift bg-cyan-50 dark:bg-brandbg border border-cyan-200 dark:border-cyan-500/30 text-cyan-700 dark:text-brand px-3 py-1.5 rounded-md flex items-center gap-1.5 hover:bg-cyan-100 dark:hover:bg-cyan-900/40 transition active:scale-95 cursor-pointer">
                    <i id="interval-icon" class="fa-solid fa-rotate-right"></i> <span id="interval-text">10s</span>
                </button>
                <div class="flex items-center gap-1.5 text-slate-800 dark:text-white">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></span> Live
                </div>
                <button onclick="toggleAudio()" class="flex items-center gap-1.5 hover:text-cyan-600 dark:hover:text-white transition ml-2 active:scale-95 cursor-pointer p-1">
                    <i id="notif-icon" class="fa-regular fa-bell"></i> <span id="notif-text">Sound Off</span>
                </button>
                <button onclick="manualFetch()" id="fetch-btn" class="bg-slate-800 dark:bg-darkborder hover:bg-slate-700 dark:hover:bg-gray-700 text-white px-4 py-2 rounded-md flex items-center gap-2 ml-auto transition shadow-sm active:scale-95 cursor-pointer">
                    <i id="fetch-icon" class="fa-solid fa-envelope-open-text"></i> Fetch Emails
                </button>
            </div>

            <div id="inbox-content" class="min-h-[350px] bg-white dark:bg-[#0f1525] transition-colors relative flex flex-col p-2 gap-2"></div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 bg-slate-900/60 dark:bg-darkbg/80 hidden justify-center items-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-darkpanel w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-slate-200 dark:border-darkborder">
            <div class="p-5 border-b border-slate-200 dark:border-darkborder flex justify-between items-start bg-slate-50 dark:bg-darkbg">
                <div class="pr-4 flex-1 min-w-0">
                    <h3 id="modal-subject" class="font-bold text-xl text-slate-900 dark:text-white mb-1 truncate">Subject</h3>
                    <p class="text-sm text-slate-500 dark:text-gray-400">From: <span id="modal-from" class="text-cyan-600 dark:text-brand font-semibold color-shift"></span></p>
                </div>
                <button onclick="closeModal()" class="p-2 text-slate-500 hover:text-red-500 bg-slate-200 dark:bg-darkborder/50 rounded-lg transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <iframe id="modal-body-iframe" class="flex-1 w-full bg-white" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>

    <script>
        // --- YOUR ORIGINAL LOGIC (RESTORED) ---
        const API = 'https://api.mail.tm';
        let token = localStorage.getItem('mt_token');
        let address = localStorage.getItem('mt_email');
        let password = localStorage.getItem('mt_password') || 'Aryan@123';
        let refreshSec = 10;
        let soundOn = false;

        // NEW: Theme Engine
        function toggleThemePanel() { document.getElementById('theme-panel').classList.toggle('open'); }
        function initThemeGrid() {
            const grid = document.getElementById('theme-grid');
            for (let i = 0; i < 100; i++) {
                const hue = i * 3.6;
                const btn = document.createElement('button');
                btn.className = "w-full h-8 rounded border border-black/10 transition hover:scale-110 shadow-sm";
                btn.style.backgroundColor = `hsl(${hue}, 70%, 50%)`;
                btn.onclick = () => {
                    document.documentElement.style.setProperty('--hue-rotate', `${hue}deg`);
                    localStorage.setItem('user-hue', `${hue}deg`);
                };
                grid.appendChild(btn);
            }
        }

        // --- Original API Functions ---
        async function generateNewEmail() {
            try {
                const domainResp = await fetch(`${API}/domains`);
                const domains = await domainResp.json();
                const domain = domains['hydra:member'][0].domain;
                const newEmail = `aryan${Math.floor(Math.random()*10000)}@${domain}`;
                
                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newEmail, password: password })
                });

                const loginResp = await fetch(`${API}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newEmail, password: password })
                });
                const loginData = await loginResp.json();
                
                token = loginData.token;
                address = newEmail;
                localStorage.setItem('mt_token', token);
                localStorage.setItem('mt_email', address);
                
                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                manualFetch();
            } catch (e) { console.error(e); }
        }

        // Rest of your functions (manualFetch, openMail, copyEmail, etc.)
        // (Maintaining all your original logic below)
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.className = html.classList.contains('dark') ? 'fa-solid fa-moon text-yellow-400' : 'fa-solid fa-sun text-orange-500';
        }

        function copyEmail() {
            const copyText = document.getElementById("email-address");
            copyText.select();
            document.execCommand("copy");
            const msg = document.getElementById("copy-msg");
            msg.style.opacity = "1";
            setTimeout(() => { msg.style.opacity = "0"; }, 2000);
        }

        function forceNewAccount() {
            localStorage.clear();
            location.reload();
        }

        async function manualFetch() {
            if(!token) return;
            try {
                const resp = await fetch(`${API}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await resp.json();
                renderInbox(data['hydra:member']);
            } catch(e) {}
        }

        function renderInbox(mails) {
            const container = document.getElementById('inbox-content');
            container.innerHTML = mails.length ? '' : '<div class="text-center p-10 opacity-50">Inbox Empty</div>';
            mails.forEach(m => {
                const div = document.createElement('div');
                div.className = "p-4 border border-slate-200 dark:border-darkborder rounded-xl cursor-pointer hover:bg-slate-50 dark:hover:bg-darkborder/30 transition";
                div.onclick = () => openMail(m.id);
                div.innerHTML = `<div class="font-bold">${m.subject}</div><div class="text-xs opacity-60">${m.from.address}</div>`;
                container.appendChild(div);
            });
        }

        async function openMail(id) {
            const resp = await fetch(`${API}/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const mail = await resp.json();
            document.getElementById('modal-subject').innerText = mail.subject;
            document.getElementById('modal-from').innerText = mail.from.address;
            document.getElementById('modal-body-iframe').srcdoc = mail.html || mail.intro;
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
        }

        function closeModal() { document.getElementById('email-modal').classList.add('hidden'); }

        // Start App
        document.addEventListener('DOMContentLoaded', () => {
            initThemeGrid();
            const savedHue = localStorage.getItem('user-hue');
            if(savedHue) document.documentElement.style.setProperty('--hue-rotate', savedHue);
            
            if (token && address) {
                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                manualFetch();
            } else {
                generateNewEmail();
            }
        });
    </script>
</body>
</html>
