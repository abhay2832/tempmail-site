<!DOCTYPE html>
<html>
<head>
<title>Temp Mail</title>
</head>

<body>

<h2>Temp Mail</h2>

<h3 id="email">Loading...</h3>

<button onclick="generateEmail()">New Email</button>
<button onclick="copyEmail()">Copy</button>

<h3>Inbox</h3>
<button onclick="loadInbox()">Refresh</button>

<div id="inbox"></div>

<script>

let login = "";
let domain = "1secmail.com";

function generateEmail(){
  login = "user" + Math.floor(Math.random()*100000);
  document.getElementById("email").innerText = login + "@" + domain;
}

function copyEmail(){
  navigator.clipboard.writeText(login + "@" + domain);
  alert("Copied");
}

function loadInbox(){
  let url = "https://www.1secmail.com/api/v1/?action=getMessages&login=" + login + "&domain=" + domain;

  fetch(url)
  .then(res => res.json())
  .then(data => {

    let box = document.getElementById("inbox");
    box.innerHTML = "";

    if(data.length == 0){
      box.innerHTML = "No Mail";
      return;
    }

    data.forEach(m => {
      let div = document.createElement("div");
      div.innerHTML = m.from + " - " + m.subject;
      box.appendChild(div);
    });

  });
}

generateEmail();

</script>

</body>
</html>
