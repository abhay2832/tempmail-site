<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Real & Working</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        .dark .loader { border-color: #374151; border-top-color: #60a5fa; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 flex justify-between items-center mt-4">
        <h1 class="text-3xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight flex items-center gap-2">
            <i class="fa-solid fa-bolt text-yellow-500"></i> TempMail Pro
        </h1>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition">
            <i id="theme-icon" class="fa-solid fa-moon text-gray-700 dark:text-yellow-300"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 mb-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
            <label class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-3 uppercase">Your Working Address</label>
            
            <div class="flex justify-center items-center mb-5 max-w-lg mx-auto">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-2xl p-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-900 font-mono text-blue-700 dark:text-blue-400 font-bold" value="Generating Secure Email...">
            </div>
            
            <div class="flex flex-wrap justify-center gap-3 md:gap-4">
                <button onclick="copyEmail()" class="bg-blue-600 text-white px-8 py-3 rounded-lg hover:bg-blue-700 transition shadow-md flex items-center gap-2 font-medium">
                    <i class="fa-regular fa-copy"></i> Copy
                </button>
                <button onclick="createNewAccount()" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-8 py-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition shadow-sm border border-gray-200 dark:border-gray-600 flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-arrows-rotate"></i> Change
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="bg-slate-800 dark:bg-gray-950 text-white p-5 flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-inbox text-blue-400"></i> Live Inbox
                </h2>
                <div class="flex items-center gap-3">
                    <span id="status-text" class="text-xs text-green-400 hidden"><i class="fa-solid fa-circle-check"></i> Connected</span>
                    <div id="loading-spinner" class="loader hidden"></div>
                </div>
            </div>
            <div id="inbox-content" class="p-0 min-h-[250px] bg-slate-50 dark:bg-gray-800">
                </div>
        </div>

        <div id="email-modal" class="fixed inset-0 bg-slate-900 bg-opacity-75 hidden justify-center items-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white dark:bg-gray-800 w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden">
                <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between bg-gray-50 dark:bg-gray-900">
                    <div class="pr-4 flex-1">
                        <h3 id="modal-subject" class="font-bold text-xl text-gray-900 dark:text-white mb-1">Subject</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400"><strong>From:</strong> <span id="modal-from"></span></p>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-2xl"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="modal-body" class="flex-1 bg-white relative">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // API Switched to Mail.tm (Accepts Gmail, Outlook, everything)
        const API_URL = 'https://api.mail.tm';
        let accountToken = localStorage.getItem('mt_token');
        let currentEmail = localStorage.getItem('mt_email');
        let checkInterval;

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (accountToken && currentEmail) {
                document.getElementById('email-address').value = currentEmail;
                startInboxSync();
            } else {
                createNewAccount();
            }
        });

        // Theme Toggle
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // Generate Account
        async function createNewAccount() {
            clearInterval(checkInterval);
            const input = document.getElementById('email-address');
            const inbox = document.getElementById('inbox-content');
            input.value = 'Connecting to Server...';
            document.getElementById('status-text').classList.add('hidden');
            
            inbox.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-gray-400"><i class="fa-solid fa-gear fa-spin text-4xl mb-4 text-blue-500"></i><p>Setting up your secure address...</p></div>`;

            try {
                // 1. Get available domains
                let res = await fetch(`${API_URL}/domains`);
                let data = await res.json();
                let domain = data['hydra:member'][0].domain;

                // 2. Register a random email
                let randomName = Math.random().toString(36).substring(2, 10);
                let address = `${randomName}@${domain}`;
                let password = 'strongpassword123'; // Temporary internal password

                await fetch(`${API_URL}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });

                // 3. Get API Token
                let tokenRes = await fetch(`${API_URL}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });
                let tokenData = await tokenRes.json();
                
                // Save to local storage
                accountToken = tokenData.token;
                currentEmail = address;
                localStorage.setItem('mt_token', accountToken);
                localStorage.setItem('mt_email', currentEmail);

                input.value = currentEmail;
                document.getElementById('status-text').classList.remove('hidden');
                startInboxSync();

            } catch (error) {
                input.value = 'Failed. Try Again.';
                inbox.innerHTML = '<p class="text-center text-red-500 mt-10">Error connecting to mail server.</p>';
            }
        }

        function startInboxSync() {
            fetchMails(); // First fetch
            checkInterval = setInterval(fetchMails, 4000); // Check every 4 seconds
        }

        // Fetch Inbox
        async function fetchMails() {
            if (!accountToken) return;
            const spinner = document.getElementById('loading-spinner');
            spinner.classList.remove('hidden');

            try {
                let res = await fetch(`${API_URL}/messages`, {
                    headers: { 'Authorization': `Bearer ${accountToken}` }
                });
                let data = await res.json();
                renderInbox(data['hydra:member']);
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function renderInbox(messages) {
            const inbox = document.getElementById('inbox-content');
            if (!messages || messages.length === 0) {
                inbox.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-400">
                        <i class="fa-regular fa-envelope-open text-5xl mb-4 text-gray-300 dark:text-gray-600"></i>
                        <p class="font-medium">Waiting for emails...</p>
                        <p class="text-sm mt-1">Try sending a test mail from your Gmail!</p>
                    </div>`;
                return;
            }

            let html = '<ul class="divide-y divide-gray-200 dark:divide-gray-700">';
            messages.forEach(msg => {
                html += `
                    <li class="p-4 hover:bg-blue-50 dark:hover:bg-gray-700 bg-white dark:bg-gray-800 cursor-pointer transition flex items-center gap-4" onclick="readMail('${msg.id}')">
                        <div class="bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-full w-10 h-10 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-envelope-open-text"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-gray-900 dark:text-gray-100 truncate">${msg.from.address}</p>
                            <p class="text-sm text-gray-600 dark:text-gray-400 truncate">${msg.subject || '(No Subject)'}</p>
                        </div>
                    </li>`;
            });
            html += '</ul>';
            inbox.innerHTML = html;
        }

        // Read specific mail
        async function readMail(id) {
            const modal = document.getElementById('email-modal');
            const bodyDiv = document.getElementById('modal-body');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            bodyDiv.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center bg-white"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i></div>`;

            try {
                let res = await fetch(`${API_URL}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${accountToken}` }
                });
                let data = await res.json();

                document.getElementById('modal-subject').innerText = data.subject || '(No Subject)';
                document.getElementById('modal-from').innerText = data.from.address;

                // Mail.tm returns HTML as an array
                let htmlContent = data.html ? data.html.join('') : `<pre style="padding:20px; font-family:sans-serif;">${data.text}</pre>`;

                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.sandbox = 'allow-popups allow-popups-to-escape-sandbox allow-same-origin'; 
                iframe.srcdoc = htmlContent;
                
                bodyDiv.innerHTML = '';
                bodyDiv.appendChild(iframe);
            } catch (err) {
                bodyDiv.innerHTML = `<p class="text-red-500 text-center p-10">Failed to load email.</p>`;
            }
        }

        function closeModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
            document.getElementById('modal-body').innerHTML = '';
        }

        function copyEmail() {
            navigator.clipboard.writeText(document.getElementById('email-address').value);
            alert("Email Copied!"); // Simple alert to guarantee it works on all devices
        }
    </script>
</body>
</html>
