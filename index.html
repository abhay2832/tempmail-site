‚Äé<!DOCTYPE html>

‚Äé</style>
‚Äé</head>
‚Äé
‚Äé<body>
‚Äé
‚Äé<div class="container">
‚Äé<div class="top-bar">
‚Äé<h1>TempMail Pro</h1>
‚Äé<div class="toggle" onclick="toggleDark()">üåô Mode</div>
‚Äé</div>
‚Äé
‚Äé<div class="email-box">
‚Äé<input type="text" id="email" readonly>
‚Äé<button onclick="copyEmail()">Copy</button>
‚Äé</div>
‚Äé
‚Äé<div class="email-box">
‚Äé<button onclick="forceNew()">New Email</button>
‚Äé<button class="secondary" onclick="fetchMessages()">Refresh</button>
‚Äé</div>
‚Äé
‚Äé<div id="status" class="status"></div>
‚Äé<div id="inbox" class="inbox"></div>
‚Äé
‚Äé</div>
‚Äé
‚Äé<script>
‚Äélet token="";
‚Äélet email=localStorage.getItem("tm_email");
‚Äélet password=localStorage.getItem("tm_pass");
‚Äé
‚Äéwindow.onload=async()=>{
‚Äéif(localStorage.getItem("dark_mode")==="true"){
‚Äédocument.body.classList.add("dark");
‚Äé}
‚Äéif(email && password){
‚Äéawait login(false);
‚Äé}else{
‚Äéawait createAccount();
‚Äé}
‚Äé};
‚Äé
‚Äéfunction toggleDark(){
‚Äédocument.body.classList.toggle("dark");
‚ÄélocalStorage.setItem("dark_mode",
‚Äédocument.body.classList.contains("dark"));
‚Äé}
‚Äé
‚Äéasync function createAccount(){
‚ÄésetStatus("Generating email...");
‚Äéconst d=await fetch("https://api.mail.tm/domains");
‚Äéconst dj=await d.json();
‚Äéconst domain=dj["hydra:member"][0].domain;
‚Äé
‚Äéemail=Math.random().toString(36).substring(2,10)+"@"+domain;
‚Äépassword=Math.random().toString(36).substring(2,12);
‚Äé
‚Äéawait fetch("https://api.mail.tm/accounts",{
‚Äémethod:"POST",
‚Äéheaders:{"Content-Type":"application/json"},
‚Äébody:JSON.stringify({address:email,password:password})
‚Äé});
‚Äé
‚ÄélocalStorage.setItem("tm_email",email);
‚ÄélocalStorage.setItem("tm_pass",password);
‚Äéawait login(true);
‚Äé}
‚Äé
‚Äéasync function login(isNew){
‚Äéconst res=await fetch("https://api.mail.tm/token",{
‚Äémethod:"POST",
‚Äéheaders:{"Content-Type":"application/json"},
‚Äébody:JSON.stringify({address:email,password:password})
‚Äé});
‚Äé
‚Äéif(!res.ok){
‚Äéif(!isNew){
‚ÄélocalStorage.clear();
‚Äéreturn createAccount();
‚Äé}
‚Äéreturn;
‚Äé}
‚Äé
‚Äéconst data=await res.json();
‚Äétoken=data.token;
‚Äédocument.getElementById("email").value=email;
‚ÄésetStatus("Email Ready");
‚ÄéfetchMessages();
‚Äé}
‚Äé
‚Äéasync function fetchMessages(){
‚Äéif(!token)return;
‚Äéconst r=await fetch("https://api.mail.tm/messages",{
‚Äéheaders:{Authorization:"Bearer "+token}
‚Äé});
‚Äéconst j=await r.json();
‚ÄérenderInbox(j["hydra:member"]);
‚Äé}
‚Äé
‚Äéasync function openMessage(id,container){
‚Äéconst r=await fetch("https://api.mail.tm/messages/"+id,{
‚Äéheaders:{Authorization:"Bearer "+token}
‚Äé});
‚Äéconst j=await r.json();
‚Äélet content=j.text?.trim()?j.text:(j.html?.length?j.html[0]:"No content");
‚Äéconst box=document.createElement("div");
‚Äébox.className="body-box";
‚Äébox.innerHTML=content;
‚Äécontainer.appendChild(box);
‚Äé}
‚Äé
‚Äéfunction renderInbox(msgs){
‚Äéconst inbox=document.getElementById("inbox");
‚Äéinbox.innerHTML="";
‚Äéif(!msgs || msgs.length===0){
‚Äéinbox.innerHTML='<div class="empty">No emails yet</div>';
‚Äéreturn;
‚Äé}
‚Äémsgs.forEach(m=>{
‚Äéconst div=document.createElement("div");
‚Äédiv.className="message";
‚Äédiv.innerHTML=`
‚Äé<strong>${escape(m.subject||"No Subject")}</strong><br>
‚Äé<small>From: ${escape(m.from.address)}</small><br>
‚Äé<small>${new Date(m.createdAt).toLocaleString()}</small>
‚Äé`;
‚Äédiv.onclick=()=>{
‚Äéif(!div.querySelector(".body-box")){
‚ÄéopenMessage(m.id,div);
‚Äé}
‚Äé};
‚Äéinbox.appendChild(div);
‚Äé});
‚Äé}
‚Äé
‚Äéfunction forceNew(){
‚ÄélocalStorage.clear();
‚ÄécreateAccount();
‚Äé}
‚Äé
‚Äéfunction copyEmail(){
‚Äénavigator.clipboard.writeText(email);
‚Äéalert("Copied!");
‚Äé}
‚Äé
‚Äéfunction setStatus(t){
‚Äédocument.getElementById("status").innerText=t;
‚Äé}
‚Äé
‚Äéfunction escape(t){
‚Äéconst d=document.createElement("div");
‚Äéd.innerText=t;
‚Äéreturn d.innerHTML;
‚Äé}
‚Äé
‚ÄésetInterval(fetchMessages,10000);
‚Äé</script>
‚Äé
‚Äé</body>
‚Äé</html>
