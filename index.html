<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporary Email</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4c6ef5,#7b2ff7);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.container{
width:100%;
max-width:500px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h1{text-align:center;margin-bottom:20px;}
.email-box{display:flex;gap:10px;margin-bottom:15px;}
input{
flex:1;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}
button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#4c6ef5;
color:white;
cursor:pointer;
font-size:14px;
}
button:hover{background:#364fc7;}
.secondary{background:#868e96;}
.secondary:hover{background:#495057;}
.inbox{
margin-top:15px;
max-height:300px;
overflow-y:auto;
}
.message{
background:#f1f3f5;
padding:10px;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
}
.body-box{
background:#e9ecef;
padding:10px;
border-radius:6px;
margin-top:5px;
font-size:14px;
white-space:pre-wrap;
}
.empty{text-align:center;color:#888;margin-top:20px;}
.status{text-align:center;margin-top:10px;font-size:14px;}
</style>
</head>

<body>

<div class="container">
<h1>Temporary Email</h1>

<div class="email-box">
<input type="text" id="email" readonly>
<button onclick="copyEmail()">Copy</button>
</div>

<div class="email-box">
<button onclick="forceNew()">Generate New</button>
<button class="secondary" onclick="fetchMessages()">Refresh</button>
</div>

<div id="status" class="status"></div>
<div class="inbox" id="inbox"></div>
</div>

<script>
let token="";
let email=localStorage.getItem("tm_email");
let password=localStorage.getItem("tm_pass");

window.onload=async()=>{
if(email && password){
await login(false);
}else{
await createAccount();
}
};

async function createAccount(){
try{
setStatus("Generating email...");
clearInbox();

const d=await fetch("https://api.mail.tm/domains");
const dj=await d.json();
const domain=dj["hydra:member"][0].domain;

email=Math.random().toString(36).substring(2,10)+"@"+domain;
password=Math.random().toString(36).substring(2,12);

await fetch("https://api.mail.tm/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:email,password:password})
});

localStorage.setItem("tm_email",email);
localStorage.setItem("tm_pass",password);

await login(true);

}catch(e){
setStatus("Error creating email");
}
}

async function login(isNew){
try{
const res=await fetch("https://api.mail.tm/token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:email,password:password})
});

if(!res.ok){
if(!isNew){
setStatus("Session expired. Creating new email...");
localStorage.clear();
return createAccount();
}
throw new Error("Login failed");
}

const data=await res.json();
token=data.token;

document.getElementById("email").value=email;
setStatus("Email Ready");
fetchMessages();

}catch(e){
setStatus("Login error");
}
}

async function fetchMessages(){
if(!token)return;
try{
const r=await fetch("https://api.mail.tm/messages",{
headers:{Authorization:"Bearer "+token}
});
const j=await r.json();
renderInbox(j["hydra:member"]);
}catch(e){}
}

async function openMessage(id,container){
const r=await fetch("https://api.mail.tm/messages/"+id,{
headers:{Authorization:"Bearer "+token}
});
const j=await r.json();

let content=j.text?.trim()?j.text:(j.html?.length?j.html[0]:"No content");
const box=document.createElement("div");
box.className="body-box";
box.innerHTML=content;
container.appendChild(box);
}

function renderInbox(msgs){
const inbox=document.getElementById("inbox");
inbox.innerHTML="";
if(!msgs || msgs.length===0){
inbox.innerHTML='<div class="empty">No emails yet</div>';
return;
}
msgs.forEach(m=>{
const div=document.createElement("div");
div.className="message";
div.innerHTML=`
<strong>${escape(m.subject||"No Subject")}</strong><br>
<small>From: ${escape(m.from.address)}</small><br>
<small>${new Date(m.createdAt).toLocaleString()}</small>
`;
div.onclick=()=>{
if(!div.querySelector(".body-box")){
openMessage(m.id,div);
}
};
inbox.appendChild(div);
});
}

function forceNew(){
localStorage.clear();
createAccount();
}

function copyEmail(){
navigator.clipboard.writeText(email);
alert("Copied!");
}

function setStatus(t){
document.getElementById("status").innerText=t;
}

function clearInbox(){
document.getElementById("inbox").innerHTML="";
}

function escape(t){
const d=document.createElement("div");
d.innerText=t;
return d.innerHTML;
}

setInterval(fetchMessages,10000);
</script>

</body>
</html>
