<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aryan Mails</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#0b1121;color:white}
.box{background:#131c31;padding:20px;border-radius:10px;margin:20px}
button{padding:10px 20px;margin:5px;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<div class="box" style="text-align:center">

<h1>Aryan Mails 🇮🇳</h1>

<input id="email-address" readonly style="width:100%;padding:12px;text-align:center;font-size:18px" value="Generating...">

<br>

<button onclick="copyEmail()">Copy</button>
<button onclick="forceNewAccount()">Change Email</button>
<button onclick="manualFetch()">Refresh Inbox</button>

</div>

<div class="box">
<h2>Inbox</h2>

<button onclick="clearInboxUI()">Clear Inbox</button>
<button onclick="manualFetch()">Fetch Mails</button>
<button id="autoBtn">Auto Sync</button>

<div id="total-emails">0 emails</div>

<div id="inbox-content" style="margin-top:10px">
Waiting for emails...
</div>
</div>

<div class="box" style="text-align:center">
<h3>Complete Privacy <i class="fa-solid fa-shield-halved"></i></h3>
</div>

<script>

// ================= API =================
const API="https://api.mail.tm";

let token=localStorage.getItem("mt_token");
let address=localStorage.getItem("mt_email");
let password=localStorage.getItem("mt_password")||generatePassword();

let syncTimer=null;
let refreshSec=10;
let autoSync=true;

const emailInput=document.getElementById("email-address");
const inboxContent=document.getElementById("inbox-content");
const totalEmails=document.getElementById("total-emails");

// ================= PASSWORD =================
function generatePassword(){
return Math.random().toString(36).slice(-10)+"A1!";
}

// ================= INIT =================
async function initApp(){
if(!address||!token){
await createNewAccount();
}else{
emailInput.value=address;
startSync();
manualFetch();
}
}

// ================= CREATE ACCOUNT (SHORT EMAIL) =================
async function createNewAccount(){
try{

const domainRes=await fetch(`${API}/domains`);
const domainData=await domainRes.json();
const domain=domainData["hydra:member"][0].domain;

// short email like aryan658abcd
const username="aryan"+Math.floor(Math.random()*999)+Math.random().toString(36).slice(-4);
const newAddress=`${username}@${domain}`;
const newPassword=generatePassword();

await fetch(`${API}/accounts`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:newAddress,password:newPassword})
});

const loginRes=await fetch(`${API}/token`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:newAddress,password:newPassword})
});

const loginData=await loginRes.json();

address=newAddress;
token=loginData.token;
password=newPassword;

localStorage.setItem("mt_email",address);
localStorage.setItem("mt_token",token);
localStorage.setItem("mt_password",password);

emailInput.value=address;

clearInboxUI();
startSync();
manualFetch();

}catch(e){
emailInput.value="Error generating email";
}
}

// ================= CHANGE EMAIL =================
function forceNewAccount(){
localStorage.clear();
address=null;
token=null;
createNewAccount();
}

// ================= FETCH MAIL =================
async function manualFetch(){

if(!token) return;

try{
const res=await fetch(`${API}/messages`,{
headers:{Authorization:`Bearer ${token}`}
});
const data=await res.json();
const mails=data["hydra:member"];

totalEmails.innerText=mails.length+" emails";

if(mails.length===0){
clearInboxUI();
return;
}

inboxContent.innerHTML="";

mails.forEach(m=>{
const div=document.createElement("div");
div.style.border="1px solid #333";
div.style.padding="10px";
div.style.marginTop="5px";

div.innerHTML=`
<b>${m.from.address}</b><br>
${m.subject||"No subject"}
`;

div.onclick=()=>openEmail(m.id);

inboxContent.appendChild(div);
});

}catch(e){
console.log(e);
}
}

// ================= OPEN MAIL =================
async function openEmail(id){

const res=await fetch(`${API}/messages/${id}`,{
headers:{Authorization:`Bearer ${token}`}
});

const data=await res.json();

alert("FROM: "+data.from.address+"\n\n"+(data.text||"no content"));

}

// ================= CLEAR INBOX =================
function clearInboxUI(){
inboxContent.innerHTML="Inbox Cleared";
totalEmails.innerText="0 emails";
}

// ================= COPY =================
function copyEmail(){
emailInput.select();
document.execCommand("copy");
}

// ================= AUTO REFRESH =================
function startSync(){
if(syncTimer) clearInterval(syncTimer);

if(autoSync){
syncTimer=setInterval(()=>{
manualFetch();
},refreshSec*1000);
}
}

// ================= AUTO BUTTON =================
document.getElementById("autoBtn").onclick=function(){
autoSync=!autoSync;

if(autoSync){
startSync();
this.innerText="Auto Sync ON";
}else{
clearInterval(syncTimer);
this.innerText="Auto Sync OFF";
}
}

// ================= START =================
initApp();

</script>

</body>
</html>
