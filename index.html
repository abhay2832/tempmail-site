<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail Pro - Secure & Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        .dark .loader { border-color: #374151; border-top-color: #60a5fa; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Scrollbar UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen" onclick="enableAudioContext()">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="max-w-4xl mx-auto p-4 flex justify-between items-center mt-4 border-b border-gray-200 dark:border-gray-800 pb-4">
        <div class="flex items-center gap-3">
            <img id="site-logo" src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Logo" class="w-10 h-10 object-contain drop-shadow-sm">
            <h1 class="text-2xl md:text-3xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight hidden sm:block">
                TempMail Pro
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="audio-status" class="text-xs text-gray-400 flex items-center gap-1 cursor-pointer" title="Click anywhere on screen to enable sound">
                <i class="fa-solid fa-volume-xmark"></i> Sound Off
            </span>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center hover:bg-gray-300 dark:hover:bg-gray-600 transition shadow-inner">
                <i id="theme-icon" class="fa-solid fa-moon text-gray-700 dark:text-yellow-300"></i>
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 mt-2">
        <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 mb-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
            <label class="block text-sm font-semibold text-gray-500 dark:text-gray-400 mb-4 uppercase tracking-widest">Your Secure Email Address</label>
            
            <div class="flex justify-center items-center mb-6 max-w-xl mx-auto relative group">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl p-4 md:p-5 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none bg-gray-50 dark:bg-gray-900 font-mono text-blue-700 dark:text-blue-400 font-bold transition-all cursor-text select-all" value="Connecting...">
            </div>
            
            <div class="flex flex-wrap justify-center gap-3 md:gap-4">
                <button onclick="copyEmail()" class="bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 transition shadow-md hover:shadow-lg flex items-center gap-2 font-semibold active:scale-95">
                    <i class="fa-regular fa-copy text-lg"></i> Copy Address
                </button>
                <button onclick="createNewAccount()" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 px-8 py-3.5 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition border border-gray-200 dark:border-gray-600 flex items-center gap-2 font-semibold active:scale-95">
                    <i class="fa-solid fa-arrows-rotate"></i> Generate New
                </button>
            </div>
            <p id="copy-msg" class="text-emerald-500 font-bold mt-4 opacity-0 transition-opacity duration-300"><i class="fa-solid fa-check-circle"></i> Copied to clipboard!</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="bg-slate-800 dark:bg-gray-950 text-white p-4 md:p-5 flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-inbox text-blue-400"></i> Auto-Refresh Inbox
                </h2>
                <div class="flex items-center gap-3">
                    <span id="status-text" class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded-full hidden font-medium border border-green-500/30">
                        <i class="fa-solid fa-circle-dot fa-fade text-[10px]"></i> Live
                    </span>
                    <div id="loading-spinner" class="loader hidden"></div>
                </div>
            </div>
            <div id="inbox-content" class="p-0 min-h-[300px] bg-slate-50 dark:bg-gray-800">
                </div>
        </div>

        <div id="email-modal" class="fixed inset-0 bg-slate-900/80 hidden justify-center items-center p-2 sm:p-4 z-50 backdrop-blur-sm">
            <div class="bg-white dark:bg-gray-800 w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[90vh] sm:h-[85vh] overflow-hidden transform transition-all scale-100">
                
                <div class="p-4 sm:p-5 border-b border-gray-200 dark:border-gray-700 flex flex-col sm:flex-row justify-between sm:items-center gap-4 bg-gray-50 dark:bg-gray-900 relative">
                    <div class="pr-8 flex-1 min-w-0">
                        <h3 id="modal-subject" class="font-bold text-xl text-gray-900 dark:text-white mb-1 truncate">Subject</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400 truncate"><strong>From:</strong> <span id="modal-from" class="text-blue-600 dark:text-blue-400 font-medium"></span></p>
                    </div>
                    
                    <div class="flex items-center gap-2 self-end sm:self-auto">
                        <button onclick="downloadCurrentMail()" class="bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-200 dark:hover:bg-indigo-800/60 transition flex items-center gap-2">
                            <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">Download</span>
                        </button>
                        
                        <button onclick="closeModal()" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-3 py-2 rounded-lg hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/50 dark:hover:text-red-400 transition text-lg">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>

                <div id="modal-body" class="flex-1 bg-white relative">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.mail.tm';
        let accountToken = localStorage.getItem('mt_token');
        let currentEmail = localStorage.getItem('mt_email');
        let checkInterval;
        
        // Sound Engine Variables
        let latestMailId = null; 
        let audioEnabled = false;
        let currentMailData = null; // Store for download feature

        // --- Init & UI Settings ---
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (accountToken && currentEmail) {
                document.getElementById('email-address').value = currentEmail;
                startInboxSync();
            } else {
                createNewAccount();
            }
        });

        function enableAudioContext() {
            if(!audioEnabled) {
                audioEnabled = true;
                const audio = document.getElementById('notification-sound');
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    const status = document.getElementById('audio-status');
                    status.innerHTML = '<i class="fa-solid fa-volume-high text-blue-500"></i> <span class="text-blue-500">Sound On</span>';
                }).catch(e => console.log("Audio unlock failed, will retry."));
            }
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        function copyEmail() {
            const emailValue = document.getElementById('email-address').value;
            if(emailValue.includes('Connecting')) return;
            navigator.clipboard.writeText(emailValue);
            
            const msg = document.getElementById('copy-msg');
            msg.classList.remove('opacity-0');
            setTimeout(() => msg.classList.add('opacity-0'), 2000);
        }

        // --- Account & API Logic ---
        async function createNewAccount() {
            clearInterval(checkInterval);
            latestMailId = null; // Reset sound tracker
            const input = document.getElementById('email-address');
            const inbox = document.getElementById('inbox-content');
            
            input.value = 'Generating Secure Email...';
            document.getElementById('status-text').classList.add('hidden');
            inbox.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-gray-400"><i class="fa-solid fa-fingerprint fa-fade text-5xl mb-4 text-blue-500"></i><p class="font-medium">Creating anonymous inbox...</p></div>`;

            try {
                let res = await fetch(`${API_URL}/domains`);
                let data = await res.json();
                let domain = data['hydra:member'][0].domain;

                let randomName = Math.random().toString(36).substring(2, 12);
                let address = `${randomName}@${domain}`;
                let password = 'TempPassword_' + Math.random(); 

                await fetch(`${API_URL}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });

                let tokenRes = await fetch(`${API_URL}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address, password: password })
                });
                let tokenData = await tokenRes.json();
                
                accountToken = tokenData.token;
                currentEmail = address;
                localStorage.setItem('mt_token', accountToken);
                localStorage.setItem('mt_email', currentEmail);

                input.value = currentEmail;
                document.getElementById('status-text').classList.remove('hidden');
                startInboxSync();
            } catch (error) {
                input.value = 'Error. Click Generate New.';
                inbox.innerHTML = '<div class="text-center text-red-500 mt-10"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i><p>Failed to connect to Mail.tm server.</p></div>';
            }
        }

        function startInboxSync() {
            fetchMails(); 
            checkInterval = setInterval(fetchMails, 4000); // Superfast 4s sync
        }

        // --- Fetch & Sound Engine ---
        async function fetchMails() {
            if (!accountToken) return;
            const spinner = document.getElementById('loading-spinner');
            spinner.classList.remove('hidden');

            try {
                let res = await fetch(`${API_URL}/messages`, {
                    headers: { 'Authorization': `Bearer ${accountToken}` }
                });
                let data = await res.json();
                let messages = data['hydra:member'];
                
                // Sound Notification Logic (Bug Free)
                if (messages.length > 0) {
                    let currentLatestId = messages[0].id;
                    if (latestMailId !== null && currentLatestId !== latestMailId) {
                        // Naya mail aaya hai! Play sound.
                        const audio = document.getElementById('notification-sound');
                        audio.currentTime = 0;
                        audio.play().catch(e => console.log('Autoplay blocked by browser'));
                    }
                    latestMailId = currentLatestId;
                }

                renderInbox(messages);
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function renderInbox(messages) {
            const inbox = document.getElementById('inbox-content');
            if (!messages || messages.length === 0) {
                inbox.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-[300px] text-gray-400">
                        <div class="relative mb-6">
                            <i class="fa-regular fa-envelope-open text-6xl text-gray-200 dark:text-gray-700"></i>
                            <div class="absolute -bottom-2 -right-2 bg-blue-500 rounded-full w-5 h-5 border-2 border-white dark:border-gray-800 animate-ping"></div>
                        </div>
                        <p class="font-bold text-lg text-gray-500 dark:text-gray-400">Inbox is empty</p>
                        <p class="text-sm mt-1">Waiting for incoming emails & OTPs</p>
                    </div>`;
                return;
            }

            let html = '<ul class="divide-y divide-gray-100 dark:divide-gray-800">';
            messages.forEach(msg => {
                html += `
                    <li class="p-4 md:p-5 hover:bg-blue-50 dark:hover:bg-gray-750 bg-white dark:bg-gray-800 cursor-pointer transition flex items-center gap-4 group" onclick="readMail('${msg.id}')">
                        <div class="bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 rounded-2xl w-12 h-12 flex items-center justify-center flex-shrink-0 group-hover:scale-105 transition-transform shadow-sm">
                            <i class="fa-solid fa-envelope-open-text text-lg"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <p class="font-bold text-gray-900 dark:text-gray-100 truncate pr-2 text-base">${msg.from.address}</p>
                                <span class="text-xs font-semibold text-gray-400 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded whitespace-nowrap">
                                    ${new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                </span>
                            </div>
                            <p class="text-sm text-gray-600 dark:text-gray-400 truncate font-medium">${msg.subject || '(No Subject)'}</p>
                            <p class="text-xs text-gray-400 truncate mt-0.5">${msg.intro || ''}</p>
                        </div>
                    </li>`;
            });
            html += '</ul>';
            inbox.innerHTML = html;
        }

        // --- Read Mail & Download Feature ---
        async function readMail(id) {
            const modal = document.getElementById('email-modal');
            const bodyDiv = document.getElementById('modal-body');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            currentMailData = null; // Reset
            
            bodyDiv.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center bg-white"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i><p class="text-gray-500 font-medium">Decrypting Email...</p></div>`;

            try {
                let res = await fetch(`${API_URL}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${accountToken}` }
                });
                let data = await res.json();
                
                // Save data globally for download function
                currentMailData = data;

                document.getElementById('modal-subject').innerText = data.subject || '(No Subject)';
                document.getElementById('modal-from').innerText = data.from.address;

                let htmlContent = data.html ? data.html.join('') : `<div style="padding:20px; font-family:sans-serif; color:#333; line-height:1.6; white-space:pre-wrap;">${data.text}</div>`;

                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.sandbox = 'allow-popups allow-popups-to-escape-sandbox allow-same-origin'; 
                iframe.srcdoc = htmlContent;
                
                bodyDiv.innerHTML = '';
                bodyDiv.appendChild(iframe);
            } catch (err) {
                bodyDiv.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-red-500"><i class="fa-solid fa-triangle-exclamation text-4xl mb-2"></i><p>Failed to load email content.</p></div>`;
            }
        }

        function downloadCurrentMail() {
            if (!currentMailData) return alert("Email is still loading...");
            
            const subject = currentMailData.subject || 'TempMail_Message';
            const content = currentMailData.html ? currentMailData.html.join('') : currentMailData.text;
            
            // Create a Blob from the HTML/Text content
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            // Create a temporary anchor tag to trigger download
            const a = document.createElement('a');
            a.href = url;
            a.download = `${subject.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function closeModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
            document.getElementById('modal-body').innerHTML = '';
            currentMailData = null;
        }
    </script>
</body>
</html>
