<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arya Mails - Premium Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: {
                    colors: {
                        darkbg: '#0b1121', darkpanel: '#131c31', darkborder: '#1e293b', 
                        cyanbg: 'rgba(34, 211, 238, 0.1)', cyantext: '#22d3ee',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                } 
            } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1121; color: #f8fafc; }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .spin-slow { animation: spin 2s linear infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b1121; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="border-b border-darkborder bg-darkpanel/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                <span class="text-xl font-bold tracking-tight">Arya<span class="text-cyantext"> Mails</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-cyanbg text-cyantext text-xs font-semibold border border-cyan-500/30">
                    <i class="fa-solid fa-shield-halved"></i> Trusted by 1M+ users
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8 mb-12">
        <div class="bg-darkpanel border border-darkborder rounded-2xl p-6 md:p-8 text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Your Secure Email Address</p>
            
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl py-4 px-4 bg-darkbg border border-darkborder rounded-xl font-mono text-white font-bold transition-all focus:outline-none focus:border-cyan-500" value="Generating...">
                <div id="loading-overlay" class="absolute inset-0 bg-darkbg rounded-xl flex items-center justify-center border border-darkborder">
                    <i class="fa-solid fa-circle-notch spin-slow text-2xl text-cyan-500"></i>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="copyEmail()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-2.5 rounded-lg transition font-semibold flex items-center gap-2 active:scale-95 text-sm">
                    <i class="fa-regular fa-copy"></i> Copy Address
                </button>
                <button onclick="generateNewEmail()" class="bg-transparent hover:bg-darkborder text-gray-300 border border-darkborder px-6 py-2.5 rounded-lg transition font-semibold flex items-center gap-2 active:scale-95 text-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Change Email
                </button>
            </div>
            <p id="copy-msg" class="text-green-400 text-sm font-bold mt-4 opacity-0 transition-opacity duration-300">Copied to clipboard!</p>
        </div>
    </div>

    <div class="text-center max-w-3xl mx-auto px-4 mb-6">
        <h2 class="text-2xl md:text-3xl font-extrabold text-white mb-2 tracking-tight">Real-time <span class="text-cyantext">Inbox</span></h2>
        <p class="text-gray-400 text-sm md:text-base">Receive and manage your temporary emails instantly.</p>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div class="bg-darkpanel border border-darkborder rounded-2xl overflow-hidden shadow-2xl">
            
            <div class="bg-darkbg/50 px-5 py-4 border-b border-darkborder flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-envelope text-cyantext text-lg"></i>
                    <span class="text-white font-bold text-lg tracking-wide">Inbox</span>
                    <span id="badge-new" class="bg-cyanbg text-cyantext text-xs px-2.5 py-1 rounded-full border border-cyan-500/20 font-semibold hidden">0 new</span>
                </div>
            </div>

            <div class="px-5 py-3 border-b border-darkborder flex flex-wrap items-center gap-4 text-xs font-semibold text-gray-400 bg-darkpanel">
                <div class="flex items-center gap-1.5"><i class="fa-solid fa-bolt text-gray-500"></i> Auto-Sync</div>
                
                <button onclick="changeRefreshInterval()" class="bg-cyanbg border border-cyan-500/30 text-cyantext px-3 py-1.5 rounded-md flex items-center gap-1.5 hover:bg-cyan-900/40 transition">
                    <i id="interval-icon" class="fa-solid fa-rotate-right"></i> <span id="interval-text">10s</span>
                </button>
                
                <div class="flex items-center gap-1.5 text-white">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></span> Live
                </div>
                
                <button onclick="toggleAudio()" class="flex items-center gap-1.5 hover:text-white transition ml-2">
                    <i id="notif-icon" class="fa-regular fa-bell"></i> <span id="notif-text">Sound Off</span>
                </button>
                
                <button onclick="manualFetch()" id="fetch-btn" class="bg-darkborder hover:bg-gray-700 text-white px-4 py-2 rounded-md flex items-center gap-2 ml-auto transition">
                    <i id="fetch-icon" class="fa-solid fa-envelope-open-text"></i> Fetch Emails
                </button>
            </div>

            <div class="px-5 py-2.5 border-b border-darkborder flex justify-between items-center text-xs font-medium text-gray-400 bg-darkbg">
                <div class="flex gap-6">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-filter"></i> All Emails</span>
                </div>
                <div id="total-emails" class="font-bold text-white">0 emails</div>
            </div>
            
            <div id="inbox-content" class="min-h-[350px] bg-[#0f1525]"></div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 bg-darkbg/80 hidden justify-center items-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-darkpanel w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-darkborder">
            <div class="p-5 border-b border-darkborder flex justify-between items-start bg-darkbg">
                <div class="pr-4 flex-1 min-w-0">
                    <h3 id="modal-subject" class="font-bold text-xl text-white mb-1 truncate">Subject</h3>
                    <p class="text-sm text-gray-400 truncate">From: <span id="modal-from" class="text-cyantext font-semibold"></span></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="downloadMail()" class="p-2 text-gray-400 hover:text-cyantext bg-darkborder/50 hover:bg-darkborder rounded-lg transition">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button onclick="closeModal()" class="p-2 text-gray-400 hover:text-red-400 bg-darkborder/50 hover:bg-darkborder rounded-lg transition">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
            </div>
            <div id="modal-body" class="flex-1 bg-white relative"></div>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let token = null;
        let address = null;
        let syncTimer = null;
        let refreshSec = 10; 
        let lastMailId = null; 
        let soundOn = false;
        let currentMail = null;

        // Start exactly when page loads
        window.onload = () => {
            renderEmpty();
            generateNewEmail();
        };

        async function generateNewEmail() {
            if(syncTimer) clearInterval(syncTimer);
            token = null; address = null; lastMailId = null;
            
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('email-address').value = 'Generating...';
            renderEmpty();

            try {
                let domRes = await fetch(`${API}/domains`);
                let domData = await domRes.json();
                let domainName = domData['hydra:member'][0].domain;

                let randomStr = Math.random().toString(36).substring(2, 12);
                let newAddress = `${randomStr}@${domainName}`;
                let newPassword = 'PWD_' + Math.random().toString(36); 

                await fetch(`${API}/accounts`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newAddress, password: newPassword })
                });

                let tokRes = await fetch(`${API}/token`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: newAddress, password: newPassword })
                });
                let tokData = await tokRes.json();
                
                token = tokData.token;
                address = newAddress;

                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                
                checkMails(); 
                syncTimer = setInterval(checkMails, refreshSec * 1000);
            } catch (err) {
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('email-address').value = 'Network Error. Click Change.';
            }
        }

        async function checkMails() {
            if (!token) return;
            try {
                let res = await fetch(`${API}/messages`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return;
                let data = await res.json();
                let msgs = data['hydra:member'] || [];
                
                document.getElementById('total-emails').innerText = `${msgs.length} emails`;
                
                if (msgs.length > 0) {
                    let topId = msgs[0].id;
                    if (lastMailId !== null && topId !== lastMailId && soundOn) {
                        let audio = document.getElementById('notification-sound');
                        audio.currentTime = 0; audio.play().catch(e=>console.log(e));
                    }
                    lastMailId = topId;
                    
                    document.getElementById('badge-new').innerText = `${msgs.length} new`;
                    document.getElementById('badge-new').classList.remove('hidden');
                    renderList(msgs);
                } else {
                    document.getElementById('badge-new').classList.add('hidden');
                    renderEmpty();
                }
            } catch (err) { console.error(err); } 
        }

        function manualFetch() {
            let btn = document.getElementById('fetch-icon');
            btn.classList.add('fa-spin'); 
            checkMails().then(() => setTimeout(() => btn.classList.remove('fa-spin'), 500));
        }

        function changeRefreshInterval() {
            let arr = [10, 30, 50];
            refreshSec = arr[(arr.indexOf(refreshSec) + 1) % arr.length];
            document.getElementById('interval-text').innerText = refreshSec + 's';
            if(document.getElementById('auto-time')) document.getElementById('auto-time').innerText = refreshSec;
            
            if(syncTimer) {
                clearInterval(syncTimer);
                syncTimer = setInterval(checkMails, refreshSec * 1000);
            }
        }

        function toggleAudio() {
            let icon = document.getElementById('notif-icon');
            let text = document.getElementById('notif-text');
            if(!soundOn) {
                soundOn = true;
                document.getElementById('notification-sound').play().then(() => {
                    document.getElementById('notification-sound').pause();
                }).catch(e=>{});
                icon.classList.replace('fa-regular', 'fa-solid');
                icon.classList.add('text-cyantext'); text.classList.add('text-cyantext');
                text.innerText = "Sound On";
            } else {
                soundOn = false;
                icon.classList.replace('fa-solid', 'fa-regular');
                icon.classList.remove('text-cyantext'); text.classList.remove('text-cyantext');
                text.innerText = "Sound Off";
            }
        }

        function copyEmail() {
            let val = document.getElementById('email-address').value;
            if(!val || val.includes('Generating')) return;
            navigator.clipboard.writeText(val).then(() => {
                let m = document.getElementById('copy-msg');
                m.classList.remove('opacity-0');
                setTimeout(() => m.classList.add('opacity-0'), 2000);
            });
        }

        function renderEmpty() {
            document.getElementById('inbox-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full p-16">
                    <div class="text-gray-500 text-6xl mb-4"><i class="fa-solid fa-inbox"></i></div>
                    <h3 class="text-white font-bold text-lg mb-2">No emails yet</h3>
                    <p class="text-gray-400 text-sm mb-4">Waiting for incoming messages...</p>
                    <div class="flex justify-center mb-3">
                        <span class="text-cyantext text-xs font-semibold flex items-center gap-1.5 bg-cyanbg px-3 py-1 rounded border border-cyan-500/20">
                            <i class="fa-solid fa-key"></i> Token-secured access
                        </span>
                    </div>
                    <p class="text-gray-500 text-xs">Auto-checking every <span id="auto-time">${refreshSec}</span> seconds...</p>
                </div>`;
        }

        function renderList(msgs) {
            let html = '<ul class="divide-y divide-darkborder">';
            msgs.forEach(m => {
                html += `
                    <li class="p-5 hover:bg-darkborder/30 cursor-pointer flex items-center gap-4" onclick="openMail('${m.id}')">
                        <div class="bg-cyanbg text-cyantext rounded-full w-10 h-10 flex items-center justify-center font-bold border border-cyan-500/20">
                            ${m.from.address.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <p class="font-bold text-gray-100 truncate">${m.from.address}</p>
                                <span class="text-xs text-gray-400 bg-darkbg px-2 py-1 rounded border border-darkborder">${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <p class="text-sm text-gray-400 truncate">${m.subject || '(No Subject)'}</p>
                        </div>
                    </li>`;
            });
            html += '</ul>';
            document.getElementById('inbox-content').innerHTML = html;
        }

        async function openMail(id) {
            let mod = document.getElementById('email-modal');
            let bod = document.getElementById('modal-body');
            mod.classList.remove('hidden'); mod.classList.add('flex');
            bod.innerHTML = `<div class="absolute inset-0 flex items-center justify-center bg-white"><i class="fa-solid fa-circle-notch spin-slow text-3xl text-cyan-500"></i></div>`;

            try {
                let res = await fetch(`${API}/messages/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                let data = await res.json();
                currentMail = data;
                document.getElementById('modal-subject').innerText = data.subject || '(No Subject)';
                document.getElementById('modal-from').innerText = data.from.address;

                let content = data.html ? data.html.join('') : `<div style="padding:20px; font-family:sans-serif;">${data.text}</div>`;
                let frame = document.createElement('iframe');
                frame.style.width = '100%'; frame.style.height = '100%'; frame.style.border = 'none';
                frame.sandbox = 'allow-popups allow-popups-to-escape-sandbox allow-same-origin'; 
                frame.srcdoc = content;
                bod.innerHTML = ''; bod.appendChild(frame);
            } catch (err) { bod.innerHTML = `<p class="text-center text-red-500 mt-10">Error loading email.</p>`; }
        }

        function downloadMail() {
            if (!currentMail) return;
            let c = currentMail.html ? currentMail.html.join('') : currentMail.text;
            let b = new Blob([c], { type: 'text/html' });
            let u = URL.createObjectURL(b);
            let a = document.createElement('a');
            a.href = u; a.download = 'email.html';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
        }

        function closeModal() {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
            document.getElementById('modal-body').innerHTML = ''; currentMail = null;
        }
    </script>
</body>
</html>
