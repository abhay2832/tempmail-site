<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Temp Mail</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  text-align: center;
  margin: 0;
}
.header {
  background: #4CAF50;
  color: white;
  padding: 15px;
  font-size: 22px;
}
.box {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}
button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #45a049;
}
#email {
  font-weight: bold;
  font-size: 18px;
}
.mail {
  border-bottom: 1px solid #ddd;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">📧 My Temp Mail</div>

<div class="box">
  <p>Your Email:</p>
  <div id="email">Loading...</div>
  <button onclick="copyEmail()">Copy</button>
  <button onclick="loadInbox()">Refresh Inbox</button>
</div>

<div class="box">
  <h3>Inbox</h3>
  <div id="inbox">No messages</div>
</div>

<script>
let token = "";
let accountId = "";
let emailAddress = "";

// Generate random email
async function createEmail() {
  try {
    let domainRes = await fetch("https://api.mail.tm/domains");
    let domainData = await domainRes.json();
    let domain = domainData["hydra:member"][0].domain;

    let random = Math.random().toString(36).substring(2, 10);
    emailAddress = random + "@" + domain;

    let res = await fetch("https://api.mail.tm/accounts", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        address: emailAddress,
        password: "12345678"
      })
    });

    let acc = await res.json();
    accountId = acc.id;

    document.getElementById("email").innerText = emailAddress;

    await login();
    loadInbox();

  } catch (err) {
    document.getElementById("email").innerText = "Error loading email";
  }
}

// Login
async function login() {
  let res = await fetch("https://api.mail.tm/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      address: emailAddress,
      password: "12345678"
    })
  });

  let data = await res.json();
  token = data.token;
}

// Load Inbox
async function loadInbox() {
  try {
    let res = await fetch("https://api.mail.tm/messages", {
      headers: { "Authorization": "Bearer " + token }
    });

    let data = await res.json();
    let inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if (data["hydra:member"].length === 0) {
      inbox.innerHTML = "No messages yet";
      return;
    }

    data["hydra:member"].forEach(msg => {
      let div = document.createElement("div");
      div.className = "mail";
      div.innerHTML = "<b>From:</b> " + msg.from.address +
                      "<br><b>Subject:</b> " + msg.subject;
      inbox.appendChild(div);
    });

  } catch (err) {
    document.getElementById("inbox").innerText = "Error loading inbox";
  }
}

// Copy Email
function copyEmail() {
  navigator.clipboard.writeText(emailAddress);
  alert("Email copied!");
}

// Start
createEmail();
</script>

</body>
</html>
