<!DOCTYPE html>
<html>
<head>
<title>My Temp Mail</title>
<style>
body {font-family: Arial; text-align:center; background:#f0f0f0;}
.box {background:white; padding:20px; margin:20px; border-radius:10px;}
button {padding:10px 20px;}
</style>
</head>

<body>

<h2>📧 Free Temp Mail</h2>

<div class="box">
<h3 id="email">Loading...</h3>
<button onclick="copyEmail()">Copy Email</button>
<button onclick="generateEmail()">New Email</button>
</div>

<div class="box">
<h3>Inbox</h3>
<button onclick="loadInbox()">Refresh</button>
<ul id="mails"></ul>
</div>

<script>
let login = "";
let domain = "1secmail.com";

function generateEmail(){
    login = "user" + Math.floor(Math.random()*100000);
    document.getElementById("email").innerText = login + "@" + domain;
}

function copyEmail(){
    let text = login + "@" + domain;
    navigator.clipboard.writeText(text);
    alert("Email copied: " + text);
}

function loadInbox() {
    let email = document.getElementById("email").innerText;
    let parts = email.split("@");
    const emailLogin = parts[0];
    const emailDomain = parts[1];

    let url = `https://www.1secmail.com/api/v1/?action=getMessages&login=${emailLogin}&domain=${emailDomain}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {
        let mails = document.getElementById("mails");
        mails.innerHTML = "";

        if(data.length === 0){
            mails.innerHTML = "<li>No messages yet</li>";
            return;
        }

        data.forEach(msg => {
            let li = document.createElement("li");
            li.innerHTML = `
                <b>From:</b> ${msg.from} <br>
                <b>Subject:</b> ${msg.subject} <br>
                <button onclick="readMail(${msg.id})">Open</button>
                <hr>
            `;
            mails.appendChild(li);
        });
    });
}

async function readMail(id){
    let url = `https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`;
    let res = await fetch(url);
    let data = await res.json();
    alert(data.textBody);
}

generateEmail();
</script>

</body>
</html>
