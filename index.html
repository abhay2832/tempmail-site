<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempMail Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}
.container{
max-width:800px;
margin:auto;
}
.header{
text-align:center;
margin-bottom:20px;
}
.box{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}
input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-bottom:10px;
font-size:14px;
}
button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
margin-right:5px;
}
button:hover{opacity:0.9}
.message{
border-bottom:1px solid #334155;
padding:10px 0;
cursor:pointer;
}
.message:hover{
background:#273449;
}
.otp{
background:#111827;
padding:6px;
margin-top:8px;
display:inline-block;
font-weight:bold;
color:#22c55e;
}
.loader{
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>TempMail Pro</h2>
</div>

<div class="box">
<input type="text" id="email" readonly>
<button onclick="copyEmail()">Copy</button>
<button onclick="newMail()">New</button>
<button onclick="loadInbox()">Refresh</button>
</div>

<div class="box" id="inbox">
Loading...
</div>

</div>

<script>

let login="";
let domain="1secmail.com";

function generateEmail(){
login=Math.random().toString(36).substring(2,10);
const email=login+"@"+domain;
document.getElementById("email").value=email;
localStorage.setItem("temp_login",login);
loadInbox();
}

function newMail(){
localStorage.removeItem("temp_login");
generateEmail();
}

function copyEmail(){
navigator.clipboard.writeText(document.getElementById("email").value);
alert("Email Copied");
}

async function loadInbox(){
if(!login){
login=localStorage.getItem("temp_login");
if(!login){
generateEmail();
return;
}
}
document.getElementById("inbox").innerHTML="Loading...";

try{
const res=await fetch(
`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`
);
const data=await res.json();

if(data.length===0){
document.getElementById("inbox").innerHTML="No emails yet";
return;
}

renderInbox(data);

}catch{
document.getElementById("inbox").innerHTML="Error loading inbox";
}
}

function renderInbox(messages){
const inbox=document.getElementById("inbox");
inbox.innerHTML="";
messages.forEach(m=>{
const div=document.createElement("div");
div.className="message";
div.innerHTML="<strong>"+m.subject+"</strong><br>"+m.from;
div.onclick=()=>openMessage(m.id,div);
inbox.appendChild(div);
});
}

async function openMessage(id,container){
try{
const res=await fetch(
`https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`
);
const data=await res.json();

const body=document.createElement("div");
body.innerHTML=data.textBody || data.htmlBody || "No content";

const otp=findOTP(data.textBody);
if(otp){
const otpDiv=document.createElement("div");
otpDiv.className="otp";
otpDiv.innerHTML=otp + 
` <button onclick="copyOTP('${otp}')">Copy OTP</button>`;
body.appendChild(otpDiv);
}

container.appendChild(body);

}catch{
alert("Failed to open message");
}
}

function findOTP(text){
if(!text) return null;
const match=text.match(/\b\d{4,8}\b/);
return match?match[0]:null;
}

function copyOTP(code){
navigator.clipboard.writeText(code);
alert("OTP Copied");
}

window.onload=loadInbox;
setInterval(loadInbox,10000);

</script>

</body>
</html>
