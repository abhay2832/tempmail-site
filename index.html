<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Mails - Premium Temporary Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: {
                    colors: {
                        darkbg: '#0b1121', darkpanel: '#131c31', darkborder: '#1e293b', 
                        brand: 'var(--brand-color, #22d3ee)', 
                        brandbg: 'var(--brand-bg, rgba(34, 211, 238, 0.1))',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                } 
            } 
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --brand-color: #22d3ee; --brand-bg: rgba(34, 211, 238, 0.1); }
        body { font-family: 'Inter', sans-serif; transition: all 0.4s ease; }
        @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(180deg); } 100% { filter: hue-rotate(360deg); } }
        .color-shift { animation: hue-shift 8s infinite linear; }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
        .spin-slow { animation: spin 2s linear infinite; }
        .theme-btn { background: var(--brand-color); color: white; }
        .border-brand { border-color: var(--brand-color) !important; }
        .text-brand { color: var(--brand-color) !important; }
        .bg-brand { background-color: var(--brand-color) !important; }
        .bg-brand-soft { background-color: var(--brand-bg) !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-800 dark:text-slate-100 min-h-screen pb-16">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <nav class="border-b border-slate-200 dark:border-darkborder bg-white/80 dark:bg-darkpanel/80 backdrop-blur-md sticky top-0 z-40 transition-colors">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="color-shift w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-bold text-lg shadow-lg">A</div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Aryan<span class="text-brand color-shift"> Mails</span></span>
            </div>
            
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-500/30">
                <span class="text-[10px] font-bold uppercase tracking-tighter text-orange-600 dark:text-orange-400">Indian Mails</span>
                <span class="text-sm">🇮🇳</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-soft text-brand text-xs font-semibold border border-brand/30">
                    <i class="fa-solid fa-shield-halved"></i> Trusted by 1M+ users
                </div>
                
                <button onclick="changeColorTheme()" title="Change Theme Color" class="w-9 h-9 rounded-full bg-brand text-white flex items-center justify-center hover:scale-110 transition shadow-lg cursor-pointer">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>

                <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-gray-800 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-gray-700 transition shadow-sm border border-slate-200 dark:border-gray-700 cursor-pointer">
                    <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-8 mb-12">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl p-6 md:p-8 text-center shadow-xl dark:shadow-2xl relative overflow-hidden transition-colors">
            <div class="absolute top-0 left-0 w-full h-1 bg-brand color-shift"></div>
            <p class="text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-4">Your Secure Email Address</p>
            
            <div class="relative max-w-2xl mx-auto mb-6">
                <input type="text" id="email-address" readonly class="w-full text-center text-xl md:text-3xl py-4 px-4 bg-slate-50 dark:bg-darkbg border-2 border-dashed border-slate-300 dark:border-darkborder rounded-xl font-mono text-slate-800 dark:text-white font-bold transition-all focus:outline-none focus:border-brand">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-50 dark:bg-darkbg rounded-xl flex items-center justify-center border-2 border-transparent">
                    <i class="fa-solid fa-circle-notch spin-slow text-3xl text-brand"></i>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-3 relative z-10">
                <button onclick="copyEmail()" class="bg-brand hover:brightness-110 text-white px-8 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-md cursor-pointer">
                    <i class="fa-regular fa-copy"></i> Copy Address
                </button>
                <button onclick="forceNewAccount()" class="bg-slate-100 dark:bg-transparent hover:bg-slate-200 dark:hover:bg-darkborder text-slate-700 dark:text-gray-300 border border-slate-300 dark:border-darkborder px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 active:scale-95 text-sm shadow-sm cursor-pointer">
                    <i class="fa-solid fa-arrows-rotate"></i> Change Email
                </button>
                <button onclick="manualFetch()" class="bg-brand hover:brightness-110 text-white px-6 py-3 rounded-xl transition font-semibold flex items-center gap-2 shadow-md cursor-pointer text-sm">
                    <i class="fa-solid fa-rotate"></i> Refresh Inbox
                </button>
            </div>
            <p id="copy-msg" class="text-emerald-600 dark:text-green-400 text-sm font-bold mt-4 opacity-0 transition-opacity duration-300">Copied to clipboard!</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-10">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl overflow-hidden shadow-xl dark:shadow-2xl transition-colors">
            <div class="bg-slate-50 dark:bg-darkbg/50 px-5 py-4 border-b border-slate-200 dark:border-darkborder flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-envelope text-brand text-lg"></i>
                    <span class="text-slate-800 dark:text-white font-bold text-lg tracking-wide">Inbox</span>
                </div>
                <button onclick="clearInbox()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md flex items-center gap-2 transition shadow-sm active:scale-95 text-sm font-semibold">
                    <i class="fa-solid fa-trash-can"></i> Clear Inbox
                </button>
            </div>

            <div class="px-5 py-3 border-b border-slate-200 dark:border-darkborder flex flex-wrap items-center gap-4 text-xs font-semibold text-slate-600 dark:text-gray-400 bg-white dark:bg-darkpanel">
                <button onclick="changeRefreshInterval()" class="bg-brand-soft border border-brand/30 text-brand px-3 py-1.5 rounded-md flex items-center gap-1.5 hover:brightness-95 transition active:scale-95 cursor-pointer">
                    <i id="interval-icon" class="fa-solid fa-rotate-right"></i> <span id="interval-text">10s</span>
                </button>
                <div class="flex items-center gap-1.5 text-slate-800 dark:text-white">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"></span> Live
                </div>
                <button onclick="toggleAudio()" class="flex items-center gap-1.5 hover:text-brand transition ml-2 active:scale-95 cursor-pointer p-1">
                    <i id="notif-icon" class="fa-regular fa-bell"></i> <span id="notif-text">Sound Off</span>
                </button>
                <button onclick="manualFetch()" id="fetch-btn" class="bg-slate-800 dark:bg-darkborder hover:bg-slate-700 dark:hover:bg-gray-700 text-white px-4 py-2 rounded-md flex items-center gap-2 ml-auto transition shadow-sm active:scale-95 cursor-pointer">
                    <i id="fetch-icon" class="fa-solid fa-envelope-open-text"></i> Fetch Emails
                </button>
            </div>

            <div id="inbox-content" class="min-h-[350px] bg-white dark:bg-[#0f1525] relative flex flex-col p-2 gap-2"></div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 mb-8">
        <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-2xl overflow-hidden shadow-xl dark:shadow-2xl flex flex-col md:flex-row">
            <div class="flex-1 p-6 md:p-8 border-b md:border-b-0 md:border-r border-slate-200 dark:border-darkborder bg-slate-50 dark:bg-[#0f1525]">
                <div class="flex items-center gap-2.5 mb-6">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 pulse-dot"></span>
                    <h3 class="text-slate-800 dark:text-white text-xs font-bold tracking-widest uppercase">Live Stats</h3>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-xl p-4 flex items-center gap-4 shadow-sm">
                        <div class="w-10 h-10 rounded-lg bg-brand-soft text-brand flex items-center justify-center text-lg"><i class="fa-solid fa-envelope"></i></div>
                        <div><div id="stat-today" class="text-slate-900 dark:text-white font-bold text-xl leading-tight">1,240</div><div class="text-slate-500 dark:text-gray-400 text-xs font-medium">Emails Today</div></div>
                    </div>
                    <div class="bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-xl p-4 flex items-center gap-4 shadow-sm">
                        <div class="w-10 h-10 rounded-lg bg-emerald-100 dark:bg-emerald-500/10 text-emerald-600 flex items-center justify-center text-lg"><i class="fa-solid fa-users"></i></div>
                        <div><div id="stat-inboxes" class="text-slate-900 dark:text-white font-bold text-xl leading-tight">412</div><div class="text-slate-500 dark:text-gray-400 text-xs font-medium">Inboxes Created</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 bg-slate-900/60 hidden justify-center items-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkpanel w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-slate-200 dark:border-darkborder">
            <div class="p-5 border-b border-slate-200 dark:border-darkborder flex justify-between items-start bg-slate-50 dark:bg-darkbg">
                <div class="pr-4 flex-1 min-w-0"><h3 id="modal-subject" class="font-bold text-xl text-slate-900 dark:text-white mb-1 truncate">Subject</h3><p class="text-sm text-slate-500 dark:text-gray-400 truncate">From: <span id="modal-from" class="text-brand font-semibold"></span></p></div>
                <div class="flex gap-2"><button onclick="downloadMail()" class="p-2 text-slate-500 hover:text-brand bg-slate-200 dark:bg-darkborder/50 rounded-lg transition"><i class="fa-solid fa-download"></i></button><button onclick="closeModal()" class="p-2 text-slate-500 hover:text-red-500 bg-slate-200 dark:bg-darkborder/50 rounded-lg transition"><i class="fa-solid fa-xmark text-xl"></i></button></div>
            </div>
            <iframe id="modal-body-iframe" class="flex-1 w-full bg-white" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>

    <script>
        const API = 'https://api.mail.tm';
        let token = localStorage.getItem('mt_token');
        let address = localStorage.getItem('mt_email');
        let password = localStorage.getItem('mt_password') || 'Aryan@123';
        let refreshSec = 10;
        let lastMailCount = 0;
        let soundOn = false;
        let currentMailObj = null;

        // --- 100+ Magic Color Theme Engine ---
        function changeColorTheme() {
            // Generate random HSL color for variety (100+ possibilities)
            const hue = Math.floor(Math.random() * 360);
            const brandColor = `hsl(${hue}, 70%, 50%)`;
            const brandBg = `hsl(${hue}, 70%, 90%, 0.2)`;
            
            document.documentElement.style.setProperty('--brand-color', brandColor);
            document.documentElement.style.setProperty('--brand-bg', brandBg);
            localStorage.setItem('custom-brand-color', brandColor);
            localStorage.setItem('custom-brand-bg', brandBg);
        }

        // Restore custom theme on load
        if(localStorage.getItem('custom-brand-color')) {
            document.documentElement.style.setProperty('--brand-color', localStorage.getItem('custom-brand-color'));
            document.documentElement.style.setProperty('--brand-bg', localStorage.getItem('custom-brand-bg'));
        }

        // --- Core Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') toggleTheme();
            if (token && address) {
                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                manualFetch();
                setInterval(manualFetch, refreshSec * 1000);
            } else { generateNewEmail(); }
        });

        async function generateNewEmail() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const domRes = await fetch(`${API}/domains`);
                const doms = await domRes.json();
                const domain = doms['hydra:member'].sort((a,b) => a.domain.length - b.domain.length)[0].domain;
                address = `aryan${Math.floor(100 + Math.random() * 899)}@${domain}`;
                
                await fetch(`${API}/accounts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({address, password}) });
                const tokRes = await fetch(`${API}/token`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({address, password}) });
                const tokData = await tokRes.json();
                token = tokData.token;
                
                localStorage.setItem('mt_token', token);
                localStorage.setItem('mt_email', address);
                document.getElementById('email-address').value = address;
                document.getElementById('loading-overlay').classList.add('hidden');
                manualFetch();
            } catch (e) { console.error(e); }
        }

        async function manualFetch() {
            if(!token) return;
            try {
                const res = await fetch(`${API}/messages`, { headers: {'Authorization': `Bearer ${token}`} });
                if(!res.ok) { forceNewAccount(); return; }
                const data = await res.json();
                if(data['hydra:member'].length > lastMailCount && soundOn) document.getElementById('notification-sound').play();
                lastMailCount = data['hydra:member'].length;
                renderMails(data['hydra:member']);
            } catch (e) { console.error(e); }
        }

        function renderMails(mails) {
            const cont = document.getElementById('inbox-content');
            cont.innerHTML = mails.length ? '' : '<div class="text-center text-slate-500 py-10 w-full">Inbox is empty...</div>';
            mails.forEach(m => {
                const d = document.createElement('div');
                d.className = "flex items-center justify-between p-4 bg-white dark:bg-darkpanel border border-slate-200 dark:border-darkborder rounded-xl cursor-pointer hover:border-brand transition shadow-sm";
                d.onclick = () => openMessage(m.id);
                d.innerHTML = `<div class="flex-1 truncate"><div class="font-bold truncate">${m.subject || 'No Subject'}</div><div class="text-xs text-brand truncate">${m.from.address}</div></div><button onclick="deleteMessage('${m.id}', event)" class="p-2 text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>`;
                cont.appendChild(d);
            });
        }

        async function openMessage(id) {
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
            const res = await fetch(`${API}/messages/${id}`, { headers: {'Authorization': `Bearer ${token}`} });
            const mail = await res.json();
            currentMailObj = mail;
            document.getElementById('modal-subject').innerText = mail.subject;
            document.getElementById('modal-from').innerText = mail.from.address;
            document.getElementById('modal-body-iframe').srcdoc = `<base target="_blank">${mail.html ? mail.html[0] : mail.text}`;
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').className = isDark ? "fa-solid fa-moon text-yellow-400" : "fa-solid fa-sun text-slate-600";
        }

        function copyEmail() {
            navigator.clipboard.writeText(address);
            document.getElementById('copy-msg').style.opacity = 1;
            setTimeout(() => document.getElementById('copy-msg').style.opacity = 0, 2000);
        }

        function forceNewAccount() { localStorage.clear(); location.reload(); }
        function closeModal() { document.getElementById('email-modal').className = "fixed inset-0 bg-slate-900/60 hidden justify-center items-center p-4 z-50 backdrop-blur-sm"; }
        function toggleAudio() { soundOn = !soundOn; document.getElementById('notif-text').innerText = soundOn ? "Sound On" : "Sound Off"; }
        async function clearInbox() { if(confirm("Clear all?")) { /* Logic already in manualFetch */ forceNewAccount(); } }
        async function deleteMessage(id, e) { e.stopPropagation(); await fetch(`${API}/messages/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} }); manualFetch(); }
    </script>
</body>
</html>
