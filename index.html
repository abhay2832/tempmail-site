<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempMail Pro</title>

<style>
:root{
--bg1:#4c6ef5;
--bg2:#7b2ff7;
--card:#ffffff;
--text:#111;
--muted:#666;
}

body.dark{
--bg1:#0f2027;
--bg2:#203a43;
--card:#1e1e1e;
--text:#f5f5f5;
--muted:#aaa;
}

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
transition:0.3s;
}

.container{
width:100%;
max-width:550px;
background:var(--card);
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
transition:0.3s;
}

h1{
text-align:center;
margin-bottom:20px;
color:var(--text);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.toggle{
cursor:pointer;
font-size:14px;
padding:6px 12px;
border-radius:20px;
background:#00000020;
color:var(--text);
}

.email-box{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
background:#4c6ef5;
color:white;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
}

.secondary{
background:#868e96;
}

.inbox{
margin-top:15px;
max-height:350px;
overflow-y:auto;
}

.message{
background:#00000008;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
color:var(--text);
}

body.dark .message{
background:#ffffff10;
}

.message:hover{
transform:scale(1.02);
}

.message small{
color:var(--muted);
}

.body-box{
margin-top:10px;
padding:10px;
border-radius:8px;
background:#00000010;
white-space:pre-wrap;
}

.status{
text-align:center;
margin-top:10px;
color:var(--muted);
font-size:14px;
}

.empty{
text-align:center;
color:var(--muted);
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<div class="top-bar">
<h1>TempMail Pro</h1>
<div class="toggle" onclick="toggleDark()">🌙 Mode</div>
</div>

<div class="email-box">
<input type="text" id="email" readonly>
<button onclick="copyEmail()">Copy</button>
</div>

<div class="email-box">
<button onclick="forceNew()">New Email</button>
<button class="secondary" onclick="fetchMessages()">Refresh</button>
</div>

<div id="status" class="status"></div>
<div id="inbox" class="inbox"></div>

</div>

<script>
let token="";
let email=localStorage.getItem("tm_email");
let password=localStorage.getItem("tm_pass");

window.onload=async()=>{
if(localStorage.getItem("dark_mode")==="true"){
document.body.classList.add("dark");
}
if(email && password){
await login(false);
}else{
await createAccount();
}
};

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark_mode",
document.body.classList.contains("dark"));
}

async function createAccount(){
setStatus("Generating email...");
const d=await fetch("https://api.mail.tm/domains");
const dj=await d.json();
const domain=dj["hydra:member"][0].domain;

email=Math.random().toString(36).substring(2,10)+"@"+domain;
password=Math.random().toString(36).substring(2,12);

await fetch("https://api.mail.tm/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:email,password:password})
});

localStorage.setItem("tm_email",email);
localStorage.setItem("tm_pass",password);
await login(true);
}

async function login(isNew){
const res=await fetch("https://api.mail.tm/token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({address:email,password:password})
});

if(!res.ok){
if(!isNew){
localStorage.clear();
return createAccount();
}
return;
}

const data=await res.json();
token=data.token;
document.getElementById("email").value=email;
setStatus("Email Ready");
fetchMessages();
}

async function fetchMessages(){
if(!token)return;
const r=await fetch("https://api.mail.tm/messages",{
headers:{Authorization:"Bearer "+token}
});
const j=await r.json();
renderInbox(j["hydra:member"]);
}

async function openMessage(id,container){
const r=await fetch("https://api.mail.tm/messages/"+id,{
headers:{Authorization:"Bearer "+token}
});
const j=await r.json();
let content=j.text?.trim()?j.text:(j.html?.length?j.html[0]:"No content");
const box=document.createElement("div");
box.className="body-box";
box.innerHTML=content;
container.appendChild(box);
}

function renderInbox(msgs){
const inbox=document.getElementById("inbox");
inbox.innerHTML="";
if(!msgs || msgs.length===0){
inbox.innerHTML='<div class="empty">No emails yet</div>';
return;
}
msgs.forEach(m=>{
const div=document.createElement("div");
div.className="message";
div.innerHTML=`
<strong>${escape(m.subject||"No Subject")}</strong><br>
<small>From: ${escape(m.from.address)}</small><br>
<small>${new Date(m.createdAt).toLocaleString()}</small>
`;
div.onclick=()=>{
if(!div.querySelector(".body-box")){
openMessage(m.id,div);
}
};
inbox.appendChild(div);
});
}

function forceNew(){
localStorage.clear();
createAccount();
}

function copyEmail(){
navigator.clipboard.writeText(email);
alert("Copied!");
}

function setStatus(t){
document.getElementById("status").innerText=t;
}

function escape(t){
const d=document.createElement("div");
d.innerText=t;
return d.innerHTML;
}

setInterval(fetchMessages,10000);
</script>

</body>
</html>
