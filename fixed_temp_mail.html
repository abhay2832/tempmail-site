<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Temp Mail Pro</title>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;text-align:center}
.box{background:#1e293b;margin:20px auto;padding:20px;border-radius:10px;width:90%;max-width:600px}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#22c55e}
.info{background:#3b82f6}
.danger{background:#ef4444}
.mail{background:#334155;padding:10px;margin:10px;border-radius:8px;text-align:left}
</style>
</head>

<body>

<h2>📧 Temp Mail Working</h2>

<div class="box">
<input id="email" readonly style="width:80%;padding:10px">
<br>
<button class="primary" onclick="generate()">New Email</button>
<button class="info" onclick="copy()">Copy</button>
</div>

<div class="box">
<button class="info" onclick="loadInbox()">Fetch</button>
<button class="primary" onclick="autoToggle()">Auto Refresh</button>
<button class="danger" onclick="clearBox()">Clear</button>
</div>

<div class="box">
<div id="inbox">Inbox empty</div>
</div>

<script>

let mail="";
let timer=null;

function generate(){
let r=Math.floor(Math.random()*999999);
mail="user"+r+"@1secmail.com";
email.value=mail;
inbox.innerHTML="Waiting for mails...";
}

function copy(){
navigator.clipboard.writeText(mail);
alert("Copied");
}

async function loadInbox(){
if(!mail){alert("generate first");return;}
let l=mail.split("@")[0];
let d=mail.split("@")[1];

let res=await fetch(`https://api.allorigins.win/raw?url=https://www.1secmail.com/api/v1/?action=getMessages&login=${l}&domain=${d}`);
let data=await res.json();

if(data.length==0){
inbox.innerHTML="No mail yet";
return;
}

inbox.innerHTML="";
data.forEach(m=>{
let div=document.createElement("div");
div.className="mail";
div.innerHTML=`From: ${m.from}<br>Sub: ${m.subject}<br>
<button onclick="read(${m.id})">Open</button>`;
inbox.appendChild(div);
});
}

async function read(id){
let l=mail.split("@")[0];
let d=mail.split("@")[1];

let res=await fetch(`https://api.allorigins.win/raw?url=https://www.1secmail.com/api/v1/?action=readMessage&login=${l}&domain=${d}&id=${id}`);
let data=await res.json();

alert(data.subject+"\n\n"+data.textBody);
}

function clearBox(){
inbox.innerHTML="Cleared";
}

function autoToggle(){
if(timer){
clearInterval(timer);
timer=null;
alert("Auto OFF");
}else{
timer=setInterval(loadInbox,4000);
alert("Auto ON");
}
}

generate();

</script>

</body>
</html>
