<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Temp Mail by Abhay</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.box {
  background:#1e293b;
  padding:20px;
  margin:20px auto;
  border-radius:12px;
  width:90%;
  max-width:600px;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary {background:#22c55e;}
.danger {background:#ef4444;}
.info {background:#3b82f6;}
.warn {background:#f59e0b;}

input {
  width:80%;
  padding:10px;
  border-radius:6px;
  border:none;
  margin:10px 0;
}

.mail {
  background:#334155;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  text-align:left;
}
</style>
</head>

<body>

<h2>📧 Temporary Email Service</h2>

<div class="box">
  <h3>Your Email</h3>
  <input id="email" readonly>
  <br>
  <button class="primary" onclick="generateEmail()">Generate New</button>
  <button class="info" onclick="copyEmail()">Copy</button>
</div>

<div class="box">
  <h3>Controls</h3>
  <button class="info" onclick="fetchMails()">Fetch Mails</button>
  <button class="warn" onclick="refreshInbox()">Refresh Inbox</button>
  <button class="danger" onclick="clearInbox()">Clear Inbox</button>
  <button class="primary" onclick="toggleAutoRefresh()">Auto Refresh</button>
</div>

<div class="box">
  <h3>Inbox</h3>
  <div id="inbox">No mails yet...</div>
</div>

<script>
let currentEmail = "";
let autoRefresh = false;
let interval = null;

function generateEmail() {
  let rand = Math.floor(Math.random()*100000);
  currentEmail = "user"+rand+"@1secmail.com";
  document.getElementById("email").value = currentEmail;
  document.getElementById("inbox").innerHTML = "Inbox empty...";
}

function copyEmail() {
  navigator.clipboard.writeText(currentEmail);
  alert("Email Copied!");
}

async function fetchMails() {
  if(!currentEmail) {
    alert("Generate email first");
    return;
  }

  let [login, domain] = currentEmail.split("@");

  let url = `https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`;

  let res = await fetch(url);
  let data = await res.json();

  let inbox = document.getElementById("inbox");

  if(data.length === 0) {
    inbox.innerHTML = "No messages yet...";
    return;
  }

  inbox.innerHTML = "";

  data.forEach(mail => {
    let div = document.createElement("div");
    div.className = "mail";
    div.innerHTML = `
      <b>From:</b> ${mail.from} <br>
      <b>Subject:</b> ${mail.subject} <br>
      <button onclick="readMail(${mail.id})">Open</button>
    `;
    inbox.appendChild(div);
  });
}

async function readMail(id) {
  let [login, domain] = currentEmail.split("@");

  let url = `https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`;

  let res = await fetch(url);
  let data = await res.json();

  alert("Subject: " + data.subject + "\n\n" + data.textBody);
}

function refreshInbox() {
  fetchMails();
}

function clearInbox() {
  document.getElementById("inbox").innerHTML = "Inbox cleared";
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;

  if(autoRefresh) {
    interval = setInterval(fetchMails, 5000);
    alert("Auto refresh ON");
  } else {
    clearInterval(interval);
    alert("Auto refresh OFF");
  }
}

// auto generate email on load
generateEmail();
</script>

</body>
</html>
